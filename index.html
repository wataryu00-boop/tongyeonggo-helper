function submitSignIn(){
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  if(!email || !password){AUTH_ERROR="이메일과 비밀번호를 입력하세요";render();return}
  handleSignIn(email, password);
}

function submitSignUp(){
  const realName = document.getElementById('authRealName').value.trim();
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const password2 = document.getElementById('authPassword2').value;
  if(!realName){AUTH_ERROR="실명을 입력해주세요";render();return}
  if(realName.length < 2){AUTH_ERROR="실명은 2자 이상이어야 합니다";render();return}
  if(!email || !password){AUTH_ERROR="이메일과 비밀번호를 입력하세요";render();return}
  if(password !== password2){AUTH_ERROR="비밀번호가 일치하지 않습니다";render();return}
  handleSignUp(email, password, realName);
}

function submitReset(){
  const email = document.getElementById('authEmail').value.trim();
  handleResetPassword(email);
}

async function checkApprovalStatus(){
  if(!CURRENT_USER || !window.fb) return;
  try{
    const snap = await window.fb.get(`users/${CURRENT_USER.uid}`);
    const profile = snap.val() || {};
    const newStatus = ADMIN_EMAILS.includes(CURRENT_USER.email) ? "approved" : (profile.status || "pending");
    if(newStatus !== APPROVAL_STATUS){
      APPROVAL_STATUS = newStatus;
      CURRENT_USER.status = newStatus;
      render();
    } else {
      alert("아직 승인되지 않았습니다. 관리자에게 문의해주세요.");
    }
  }catch(e){
    alert("상태 확인 실패: "+e.message);
  }
}

function renderForceResetScreen(){
  const app = document.getElementById('app');
  let h = '<div class="auth-screen">';
  h += '<div class="auth-logo">🔒</div>';
  h += '<div class="auth-title">비밀번호 재설정 필요</div>';
  h += '<div class="auth-subtitle" style="line-height:1.6">관리자가 비밀번호 재설정을 요청했습니다.<br>계속하시려면 새 비밀번호를 설정해주세요.</div>';
  
  h += '<div class="auth-card">';
  h += '<div id="frError" class="auth-error" style="display:none"></div>';
  h += '<div id="frSuccess" class="auth-success" style="display:none"></div>';
  h += `<div style="background:#f0f4ff;color:#1a237e;padding:8px 12px;border-radius:8px;font-size:11px;margin-bottom:10px">📧 ${CURRENT_USER.email}</div>`;
  h += '<input type="password" id="frCurrent" class="auth-input" placeholder="현재 비밀번호" autocomplete="current-password">';
  h += '<input type="password" id="frNew" class="auth-input" placeholder="새 비밀번호 (6자 이상)" autocomplete="new-password">';
  h += '<input type="password" id="frNew2" class="auth-input" placeholder="새 비밀번호 확인" autocomplete="new-password">';
  h += '<button class="auth-btn" id="frBtn" onclick="submitForceReset()">🔒 비밀번호 변경 & 진입</button>';
  h += '<button class="auth-btn auth-btn-secondary" onclick="handleSignOut()">로그아웃</button>';
  h += '<div style="font-size:10px;color:#86868b;text-align:center;margin-top:10px">비밀번호를 모르시면 로그아웃 후 <b>비밀번호 재설정 메일</b>을 요청하세요</div>';
  h += '</div></div>';
  
  app.innerHTML = h;
  setTimeout(()=>{const e=document.getElementById('frCurrent');if(e)e.focus()},50);
}

async function submitForceReset(){
  const cur = document.getElementById('frCurrent').value;
  const nw = document.getElementById('frNew').value;
  const nw2 = document.getElementById('frNew2').value;
  const err = document.getElementById('frError');
  const ok = document.getElementById('frSuccess');
  err.style.display="none"; ok.style.display="none";
  
  if(!cur || !nw){err.textContent="모든 필드를 입력하세요";err.style.display="block";return}
  if(nw.length < 6){err.textContent="새 비밀번호는 6자 이상이어야 합니다";err.style.display="block";return}
  if(nw !== nw2){err.textContent="새 비밀번호가 일치하지 않습니다";err.style.display="block";return}
  if(cur === nw){err.textContent="새 비밀번호가 현재와 같습니다";err.style.display="block";return}
  
  const btn = document.getElementById('frBtn');
  btn.textContent = "변경 중..."; btn.disabled = true;
  try{
    await window.fb.updatePassword(cur, nw);
    // Clear force reset flag
    const existing = ALL_USERS[CURRENT_USER.uid] || {};
    const cleared = {...existing};
    delete cleared.forcePasswordReset;
    delete cleared.forceResetBy;
    delete cleared.forceResetAt;
    cleared.passwordResetAt = new Date().toISOString();
    await window.fb.set(`users/${CURRENT_USER.uid}`, cleared);
    FORCE_RESET_MODE = false;
    ok.textContent = "✅ 비밀번호가 변경되었습니다. 앱으로 진입합니다...";
    ok.style.display = "block";
    setTimeout(render, 800);
  }catch(e){
    const code = e.code || "";
    let msg = "변경 실패: ";
    if(code.includes("wrong-password") || code.includes("invalid-credential")) msg = "현재 비밀번호가 올바르지 않습니다";
    else if(code.includes("weak-password")) msg = "새 비밀번호가 너무 약합니다";
    else if(code.includes("requires-recent-login")) msg = "보안상 다시 로그인한 뒤 시도해주세요";
    else msg += e.message;
    err.textContent = msg;
    err.style.display = "block";
    btn.textContent = "🔒 비밀번호 변경 & 진입";
    btn.disabled = false;
  }
}

function render(){
  // Auth gate
  if(AUTH_CHECKING){renderLoadingScreen();return}
  if(!CURRENT_USER){renderAuthScreen();return}
  // Approval gate (before force reset, so rejected users can't reset and continue)
  if(APPROVAL_STATUS === "rejected"){renderRejectedScreen();return}
  if(APPROVAL_STATUS === "pending"){renderPendingScreen();return}
  if(FORCE_RESET_MODE){renderForceResetScreen();return}
  
  const app=document.getElementById('app');
  let h=renderTopbar();
  h+='<div class="content">';
  if(TAB==="home"){
    try{ h+=renderHomeTab(); }
    catch(e){ 
      console.error("renderHomeTab error:", e);
      h+=`<div class="card" style="background:#ffebee;border:2px solid #c62828"><div style="font-size:13px;font-weight:700;color:#c62828">⚠️ 홈 화면 로드 실패</div><div style="font-size:11px;color:#424245;margin-top:6px;font-family:monospace;background:#fff;padding:8px;border-radius:4px">${e.message}</div><div style="margin-top:10px;display:flex;gap:6px"><button class="btn btn-sm" onclick="setTab('swap')">🔄 수업 교체 탭으로</button><button class="btn btn-sm btn-outline" onclick="setTab('night')">🌙 감독 탭으로</button></div></div>`; 
    }
  }
  else if(TAB==="swap")h+=renderSwapTab();
  else if(TAB==="find")h+=renderFindTab();
  else if(TAB==="common")h+=renderCommonTab();
  else if(TAB==="myclass")h+=renderMyClassTab();
  else if(TAB==="room")h+=renderRoomTab();
  else if(TAB==="event")h+=renderEventTab();
  else if(TAB==="view")h+=renderViewTab();
  else if(TAB==="records")h+=renderRecordsTab();
  else if(TAB==="night")h+=renderNightTab();
  else if(TAB==="attendance")h+=renderAttendanceTab();
  else if(TAB==="events")h+=renderEventsTab();
  else if(TAB==="admin" && isAdmin())h+=renderAdminTab();
  else if(TAB==="admin" && !isAdmin())h+=`<div class="empty-state"><span class="emoji">🔒</span>관리자 권한이 필요합니다</div>`;
  h+='</div>';
  h+=renderBottomNav();
  app.innerHTML=h;
  
  // More menu
  const mm=document.getElementById('moreMenu');
  mm.innerHTML=renderMoreMenu();
  mm.classList.toggle('open',MORE_OPEN);
}

// Close more menu when clicking outside
document.addEventListener('click',(e)=>{
  if(MORE_OPEN&&!e.target.closest('.more-menu')&&!e.target.closest('.topbar-btn')&&!e.target.closest('.nav-item:last-child')){MORE_OPEN=false;render()}
});

render();

// PWA install prompt
let deferredPrompt;
window.addEventListener('beforeinstallprompt',(e)=>{
  e.preventDefault();deferredPrompt=e;
  if(localStorage.getItem('pwa-installed')||localStorage.getItem('pwa-dismissed'))return;
  setTimeout(()=>{
    const banner=document.createElement('div');banner.className='install-prompt show';
    banner.innerHTML='<span style="flex:1;font-size:13px">📱 홈화면에 앱으로 설치</span><button class="primary" id="pwaInstall">설치</button><button class="close" id="pwaClose">✕</button>';
    document.body.appendChild(banner);
    document.getElementById('pwaInstall').onclick=async()=>{if(deferredPrompt){deferredPrompt.prompt();const{outcome}=await deferredPrompt.userChoice;if(outcome==='accepted')localStorage.setItem('pwa-installed','1');deferredPrompt=null}banner.remove()};
    document.getElementById('pwaClose').onclick=()=>{localStorage.setItem('pwa-dismissed','1');banner.remove()};
  },3000);
});
</script>
