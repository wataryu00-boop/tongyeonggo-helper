  DAYS.forEach(d=>{h+=`<button class="event-btn${EVENT_DAYS.includes(d)?" active":""}" onclick="toggleEventDay('${d}')">${d}</button>`});
  h+='</div>';
  h+='<div class="card-title">⏰ 행사 교시</div>';
  h+='<div class="period-grid">';
  PERIODS.forEach(p=>{h+=`<button class="event-btn${EVENT_PERIODS.includes(p)?" active":""}" onclick="toggleEventPeriod(${p})">${p}</button>`});
  h+='</div>';
  h+='<div class="qa-row">';
  h+='<button class="qa-btn" onclick="EVENT_DAYS=[...DAYS];render()">전요일</button>';
  h+='<button class="qa-btn" onclick="EVENT_PERIODS=[...PERIODS];render()">전교시</button>';
  h+='<button class="qa-btn" onclick="EVENT_PERIODS=[1,2,3,4];render()">오전</button>';
  h+='<button class="qa-btn" onclick="EVENT_PERIODS=[5,6,7];render()">오후</button>';
  h+='<button class="qa-btn" onclick="clearEvent()">초기화</button>';
  h+='</div></div>';
  if(EVENT_DAYS.length===0||EVENT_PERIODS.length===0){h+='<div class="empty-state"><span class="emoji">👆</span>요일과 교시를 선택해주세요</div>';return h}
  const slots=[];EVENT_DAYS.forEach(d=>EVENT_PERIODS.forEach(p=>slots.push(d+p)));
  const impact={};
  T.forEach(t=>{let lost=0;const det=[];slots.forEach(k=>{const v=t.s[k];if(v&&v!=="X"){const s=v.split("|")[0].split(" ")[0];if(!s.includes("공강")&&!s.includes("진로")){lost++;det.push(k+" "+v.split("|")[0])}}});if(lost>0)impact[t.n]={teacher:t,lost,details:det}});
  const sorted=Object.values(impact).sort((a,b)=>b.lost-a.lost);
  const total=sorted.reduce((s,x)=>s+x.lost,0);
  h+=`<div class="selected-banner" style="background:linear-gradient(135deg,#e65100 0%,#f57c00 100%)"><div class="subj">📉 영향 요약</div><div class="meta">${EVENT_DAYS.join("·")} 요일 × ${EVENT_PERIODS.join("·")}교시 · ${slots.length}개 슬롯<br>취소 ${total}개 수업 · ${sorted.length}명 교사 영향</div></div>`;
  if(sorted.length===0){h+='<div class="card"><div class="empty-state">영향받는 수업이 없습니다</div></div>';return h}
  h+=`<div class="card"><div class="card-title">👨‍🏫 교사별 시수 손실 (${sorted.length}명)</div>`;
  sorted.forEach(x=>{h+=`<div class="impact-row"><div><span class="impact-name">${x.teacher.n}</span><span class="impact-dept">${x.teacher.d}</span><div class="impact-details">${x.details.slice(0,2).join(", ")}${x.details.length>2?" 외 "+(x.details.length-2)+"개":""}</div></div><div class="impact-lost">-${x.lost}</div></div>`});
  h+='</div>';
  return h;
}

// Get a teacher with effective (overridden) schedule applied
// targetWeek: Monday YYYY-MM-DD of the week we want
// Returns {teacher: {n,h,d,s}, changes: {day+period: {reason, origVal, newVal}}}
function getTeacherWithOverrides(teacher, targetWeek){
  const changes = {};
  if(!targetWeek || !RECORDS[targetWeek] || Object.keys(RECORDS[targetWeek]).length===0){
    return {teacher, changes};
  }
  const copy = {...teacher, s:{...teacher.s}};
  DAYS.forEach(d=>{PERIODS.forEach(p=>{
    const result = getEffectiveSlot(teacher, d, p, targetWeek);
    if(result.changed){
      changes[d+p] = {reason: result.reason, origVal: teacher.s[d+p]||null, newVal: result.val};
      if(result.val === "취소" || result.val === "교체→"){
        delete copy.s[d+p];
      }else{
        copy.s[d+p] = result.val;
      }
    }
  })});
  return {teacher:copy, changes};
}

async function adminUpdateUser(uid, field, value){
  if(!isAdmin()){alert("관리자 권한 필요");return}
  // Conflict check (exclude this uid)
  if((field === "teacherName" || field === "homeroom") && value){
    const conflict = checkProfileConflict(field, value, uid);
    if(conflict){
      if(!confirm(`⚠️ 충돌\n\n이 ${field==="teacherName"?"이름":"반"}(${value})은 이미 ${conflict.email}이(가) 사용 중입니다.\n\n그래도 저장하시겠습니까? (기존 사용자의 값은 자동 해제됩니다)`)){
        return;
      }
      // Auto-clear from the conflicting user
      try{
        const oldEntry = ALL_USERS[conflict.uid] || {};
        const cleared = {...oldEntry};
        delete cleared[field];
        await window.fb.set(`users/${conflict.uid}`, cleared);
      }catch(e){alert("충돌 해제 실패: "+e.message);return}
    }
  }
  try{
    const existing = ALL_USERS[uid] || {};
    const updated = {...existing, [field]: value || null, updatedAt: new Date().toISOString()};
    if(!value) delete updated[field];
    await window.fb.set(`users/${uid}`, updated);
    // ALL_USERS will update via listener
  }catch(e){
    alert("저장 실패: "+e.message);
  }
}

// 야자 감독 후보 교사 목록 (해당 학년 담임 + 해당 학년 학년부장)
function getNightEligibleTeachers(grade){
  const names = new Set();
  Object.values(ALL_USERS).forEach(u=>{
    if(!u || !u.teacherName) return;
    if(u.status !== "approved" && !ADMIN_EMAILS.includes(u.email)) return;
    const hr = u.homeroom;
    if(!hr) return;
    // 해당 학년 담임 (예: grade=2 → hr="2-1", "2-10" 등)
    if(hr.startsWith(grade+'-')) names.add(u.teacherName);
    // 해당 학년 학년부장
    if(hr === 'head-'+grade) names.add(u.teacherName);
  });
  // T에서 실제 존재하는 이름만 (이름 일치 검증)
  const result = [];
  T.forEach(t=>{
    if(names.has(t.n)) result.push(t);
  });
  return result;
}

// 이번달/학기 동안 야자에 한 번이라도 참여한 모든 교사 + 횟수
function getNightTeacherStats(fromDate, toDate){
  const counts = {}; // {teacherName: count}
  Object.entries(NIGHT_SCHEDULE).forEach(([date, daySchedule])=>{
    if(date < fromDate || date > toDate) return;
    Object.values(daySchedule || {}).forEach(gradeData=>{
      Object.values(gradeData || {}).forEach(t=>{
        if(!t) return;
        counts[t] = (counts[t] || 0) + 1;
      });
    });
  });
  // pending 변경도 포함 (편집 중 미리보기)
  Object.entries(NIGHT_PENDING).forEach(([key, val])=>{
    if(!val) return;
    const [date, g, s] = key.split('|');
    if(date < fromDate || date > toDate) return;
    // 이미 서버 값이 있으면 그걸 빼고 pending 값 추가 (정확한 수정)
    const serverVal = (NIGHT_SCHEDULE[date] && NIGHT_SCHEDULE[date][g] && NIGHT_SCHEDULE[date][g][s]) || null;
    if(serverVal && serverVal !== val){
      counts[serverVal] = Math.max(0, (counts[serverVal] || 0) - 1);
    }
    if(val !== serverVal){
      counts[val] = (counts[val] || 0) + 1;
    }
  });
  // 0 이하는 제거
  const result = Object.entries(counts).filter(([,c])=>c>0).sort((a,b)=>b[1]-a[1]);
  return result; // [[name, count], ...]
}

  if(!NIGHT_ATT_DATE || !NIGHT_ATT_DATE.date) return;
  const [y,m,d] = NIGHT_ATT_DATE.date.split('-').map(Number);
  const cur = new Date(y, m-1, d);
  // delta 일 이동 (월~금만, 주말 건너뛰기)
  let count = 0;
  const step = delta > 0 ? 1 : -1;
  while(count < Math.abs(delta)){
    cur.setDate(cur.getDate() + step);
    const dow = cur.getDay();
    if(dow >= 1 && dow <= 5) count++;
  }
  const ys = cur.getFullYear();
  const ms = String(cur.getMonth()+1).padStart(2,'0');
  const ds = String(cur.getDate()).padStart(2,'0');
  openAttendance(`${ys}-${ms}-${ds}`, grade);
}

  if(NIGHT_BULK_MODE && isNightAdmin()){

// 스크롤 위치 유지하며 리렌더 (여러 frame에 걸쳐 복원 시도)
// 첫 스크롤 위치를 기억해두고, Firebase 리스너 등이 나중에 render를 또 호출해도 복원
let _preservedScrollTop = null;
let _preservedScrollTicks = 0;
function renderPreservingScroll(){
  const contentEl = document.querySelector('.content');
  if(contentEl) _preservedScrollTop = contentEl.scrollTop;
  _preservedScrollTicks = 6; // 다음 6개 frame 동안 복원 시도
  render();
  _restoreScrollLoop();
}
function _restoreScrollLoop(){
  if(_preservedScrollTop === null) return;
  requestAnimationFrame(()=>{
    const el = document.querySelector('.content');
    if(el) el.scrollTop = _preservedScrollTop;
    _preservedScrollTicks--;
    if(_preservedScrollTicks > 0){
      _restoreScrollLoop();
    } else {
      _preservedScrollTop = null;
    }
  });
}

// 이번 달의 월요일 목록 (월 단위 달력)
function getMonthWeeks(yearMonth){
  // yearMonth: "YYYY-MM"
  const [y,m] = yearMonth.split('-').map(Number);
  const first = new Date(y, m-1, 1);  // Month is 0-indexed
  const last = new Date(y, m, 0);     // Last day of the month
  
  // Move to Monday of the week containing the 1st
  const firstDow = first.getDay(); // 0=Sun, 1=Mon, ..., 6=Sat
  const startMonday = new Date(y, m-1, 1);
  if(firstDow === 0){
    // Sunday → go back 6 days to previous Monday
    startMonday.setDate(startMonday.getDate() - 6);
  } else {
    // Any other day → go back (firstDow - 1) days
    startMonday.setDate(startMonday.getDate() - (firstDow - 1));
  }
  
  const weeks = [];
  let cur = new Date(startMonday);
  // Iterate until we've passed the last day of the month
  let safety = 0;
  while(cur <= last && safety < 10){
    const week = [];
    const dayLabels = ['월','화','수','목','금'];
    for(let i=0; i<5; i++){
      const day = new Date(cur.getFullYear(), cur.getMonth(), cur.getDate() + i);
      // Format date as YYYY-MM-DD using LOCAL components (avoid UTC conversion)
      const yStr = day.getFullYear();
      const mStr = String(day.getMonth()+1).padStart(2,'0');
      const dStr = String(day.getDate()).padStart(2,'0');
      week.push({
        date: `${yStr}-${mStr}-${dStr}`,
        dayNum: day.getDate(),
        month: day.getMonth()+1,
        inMonth: day.getMonth() === m-1,
        dow: dayLabels[i]  // Explicit: i=0 is always 월, i=1 is always 화, etc.
      });
    }
    weeks.push(week);
    cur.setDate(cur.getDate() + 7);
    safety++;
  }
  return weeks;
}

function getNightCurrentMonth(){
  if(NIGHT_MONTH) return NIGHT_MONTH;
  const today = new Date();
  return today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0');
}
function changeNightMonth(delta){
  const cur = getNightCurrentMonth();
  const [y,m] = cur.split('-').map(Number);
  const d = new Date(y, m-1+delta, 1);
  NIGHT_MONTH = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
  render();
}

// 특정 날짜/학년/슬롯의 감독자 조회 (pending 변경 반영)
function getNightSupervisor(date, grade, slot){
  const key = `${date}|${grade}|${slot}`;
  const pending = NIGHT_PENDING[key];
  const hasPending = Object.prototype.hasOwnProperty.call(NIGHT_PENDING, key);
  if(hasPending){
    return {teacher: pending || null, assigned: !!pending, pending: true};
  }
  const teacher = (NIGHT_SCHEDULE[date] && NIGHT_SCHEDULE[date][grade] && NIGHT_SCHEDULE[date][grade][slot]) || null;
  return {teacher, assigned: !!teacher, pending: false};
}

// 일괄 편집: 로컬에 변경 기록
function setNightPending(date, grade, slot, teacherName){
  const key = `${date}|${grade}|${slot}`;
  const current = (NIGHT_SCHEDULE[date] && NIGHT_SCHEDULE[date][grade] && NIGHT_SCHEDULE[date][grade][slot]) || null;
  const newVal = teacherName || null;
  // 서버 값과 같으면 pending에서 제거 (no-op)
  if(current === newVal){
    delete NIGHT_PENDING[key];
  } else {
    NIGHT_PENDING[key] = newVal;
  }
}

function clearNightPending(){NIGHT_PENDING = {}; renderPreservingScroll();}

async function saveAllPending(){
  const keys = Object.keys(NIGHT_PENDING);
  if(keys.length === 0){alert("변경된 내용이 없습니다");return}
  if(!confirm(`${keys.length}건의 변경사항을 저장할까요?`))return;
  
  let ok = 0, fail = 0;
  for(const key of keys){
    const [date, grade, slot] = key.split('|');
    const val = NIGHT_PENDING[key];
    try{
      if(val){
        await window.fb.set(`nightSchedule/${date}/${grade}/${slot}`, val);
      } else {
        await window.fb.remove(`nightSchedule/${date}/${grade}/${slot}`);
      }
      ok++;
    }catch(e){
      fail++;
      console.error(`저장 실패 ${key}:`, e.message);
      if(e.message && e.message.includes("PERMISSION_DENIED")){
        alert(`⚠️ Firebase 보안 규칙 문제\n\n야자 감독 데이터 쓰기 권한이 없습니다.\nFirebase Console의 Realtime Database 규칙에 nightSchedule 경로를 추가하세요.`);
        return;
      }
    }
  }
  NIGHT_PENDING = {};
  alert(`✅ 저장 완료: 성공 ${ok}건${fail>0?`, 실패 ${fail}건`:""}`);
  renderPreservingScroll();
}

// 특정 교사의 감독 횟수 카운트 (날짜 범위 내)
function countNightShiftsForTeacher(teacherName, fromDate, toDate){
  if(!teacherName) return 0;
  let count = 0;
  Object.entries(NIGHT_SCHEDULE).forEach(([date, daySchedule])=>{
    if(date < fromDate || date > toDate) return;
    Object.values(daySchedule || {}).forEach(gradeData=>{
      Object.values(gradeData || {}).forEach(t=>{
        if(t === teacherName) count++;
      });
    });
  });
  return count;
}

// 날짜/학년/슬롯에 감독자 저장 (또는 null로 해제)
// bulk 모드면 로컬에만, 아니면 즉시 Firebase 저장
async function saveNightAssignment(date, grade, slot, teacherName){
  if(!CURRENT_USER){alert("로그인 필요");return false}
  
  // 학사일정 체크 (빈 문자열로 해제는 허용)
  if(teacherName && isNightBlocked(date, grade)){
    const reason = getBlockReason(date, grade, 'night');
    alert(`⚠️ 학사일정으로 인해 ${date} ${grade}학년 야자는 배정할 수 없습니다.\n사유: ${reason}`);
    return false;
  }
  
  // 권한 체크
  const current = getNightSupervisor(date, grade, slot);
  const isMyShift = CURRENT_USER.teacherName && current.teacher === CURRENT_USER.teacherName;
  if(!isNightAdmin() && !isMyShift){
    alert("야자 관리자만 배정할 수 있습니다.\n본인이 담당인 날짜는 교체 가능합니다.");
    return false;
  }
  
  // 일괄 편집 모드: 로컬에만 저장
  if(NIGHT_BULK_MODE){
    setNightPending(date, grade, slot, teacherName);
    return true;
  }
  
  // 즉시 저장 모드
  try{
    if(!teacherName){
      await window.fb.remove(`nightSchedule/${date}/${grade}/${slot}`);
    } else {
      await window.fb.set(`nightSchedule/${date}/${grade}/${slot}`, teacherName);
    }
    return true;
  }catch(e){
    if(e.message && e.message.includes("PERMISSION_DENIED")){
      alert("⚠️ Firebase 보안 규칙 문제\n\n야자 감독 데이터 쓰기 권한이 없습니다.\n\n관리자에게 Firebase Console의 Realtime Database 규칙에 <b>nightSchedule</b> 경로를 추가해달라고 요청하세요.");
    } else {
      alert("저장 실패: "+e.message);
    }
    return false;
  }
}

// 전주 복사: 어떤 날짜 기준 직전 같은 요일로부터 복사
async function copyFromPreviousWeek(date, grade){
  if(!isNightAdmin()){alert("야자 관리자 권한 필요");return}
  // Same weekday, 7 days earlier
  const [y,m,d] = date.split('-').map(Number);
  const prev = new Date(y, m-1, d);
  prev.setDate(prev.getDate() - 7);
  const ys=prev.getFullYear(), ms=String(prev.getMonth()+1).padStart(2,'0'), ds=String(prev.getDate()).padStart(2,'0');
  const prevDate = `${ys}-${ms}-${ds}`;
  // pending 반영된 값 읽기
  const s0Info = getNightSupervisor(prevDate, grade, 0);
  const s1Info = getNightSupervisor(prevDate, grade, 1);
  const s0 = s0Info.teacher;
  const s1 = s1Info.teacher;
  if(!s0 && !s1){alert(`${prevDate}에는 ${grade}학년 감독자가 없습니다.`);return}
  if(!confirm(`${prevDate} ${grade}학년 감독자를 ${date}로 복사할까요?\n\n감독1: ${s0||"(없음)"}\n감독2: ${s1||"(없음)"}${NIGHT_BULK_MODE?"\n\n(일괄 편집 모드: 저장 대기열에 추가됨)":""}`))return;
  if(NIGHT_BULK_MODE){
    if(s0) setNightPending(date, grade, 0, s0);
    if(s1) setNightPending(date, grade, 1, s1);
    render();
  } else {
    try{
      if(s0) await window.fb.set(`nightSchedule/${date}/${grade}/0`, s0);
      if(s1) await window.fb.set(`nightSchedule/${date}/${grade}/1`, s1);
      alert("✅ 복사 완료");
    }catch(e){alert("복사 실패: "+e.message)}
  }
}

// 현재 표시 중인 달의 빈 칸을 공정 랜덤 배정
// 이미 배정된 칸은 건드리지 않음, 같은 날 동일인 중복 금지, 학기 누적 횟수 기준 최소부터 배정
async function fillRandomAssignments(){
  if(!isNightAdmin()){alert("야자 관리자 권한 필요");return}
  if(!NIGHT_BULK_MODE){
    alert("일괄 편집 모드에서 사용하세요.\n(모드 종료 전에 '모두 저장'으로 반영해야 합니다)");
    return;
  }
  
  const grade = NIGHT_GRADE;
  const eligible = getNightEligibleTeachers(grade);
  if(eligible.length === 0){
    alert(`⚠️ ${grade}학년 담임/학년부장이 등록되지 않았습니다.\n관리자 탭에서 사용자들의 담임/학년부장 설정을 확인하세요.`);
    return;
  }
  if(eligible.length < 2){
    alert(`⚠️ 최소 2명 이상 필요합니다. (현재 ${eligible.length}명)\n같은 날 2명을 배정해야 해서 최소 2명 필요합니다.`);
    return;
  }
  
  // 현재 달의 빈 칸 수집
  const currentMonth = getNightCurrentMonth();
  const weeks = getMonthWeeks(currentMonth);
  const emptyCells = []; // [{date, slot}]
  weeks.forEach(week=>{
    week.forEach(dayInfo=>{
      if(!dayInfo.inMonth) return;
      [0,1].forEach(slot=>{
        const info = getNightSupervisor(dayInfo.date, grade, slot);
        if(!info.assigned){
          emptyCells.push({date: dayInfo.date, slot});
        }
      });
    });
  });
  
  if(emptyCells.length === 0){
    alert("이번달 " + grade + "학년은 이미 모두 배정되어 있습니다.");
    return;
  }
  
  // 학기 누적 통계 (pending 반영됨)
  const termStart = "2026-03-01";
  const today = todayStr();
  const [y,m] = currentMonth.split('-').map(Number);
  const lastD = new Date(y, m, 0);
  const termEnd = `${lastD.getFullYear()}-${String(lastD.getMonth()+1).padStart(2,'0')}-${String(lastD.getDate()).padStart(2,'0')}`;
  
  // 각 교사의 현재 누적 횟수 (학기 전체, pending 반영)
  const counts = {};
  eligible.forEach(t=>{counts[t.n] = 0});
  const stats = getNightTeacherStats(termStart, termEnd);
  stats.forEach(([name, cnt])=>{
    if(counts.hasOwnProperty(name)) counts[name] = cnt;
  });
  
  // 확인 대화
  const countList = Object.entries(counts).sort((a,b)=>a[1]-b[1]).map(([n,c])=>`${n}: ${c}회`).join('\n');
  const minC = Math.min(...Object.values(counts));
  const maxC = Math.max(...Object.values(counts));
  const msg = `🎲 ${grade}학년 ${parseInt(m)}월 랜덤 배정\n\n` +
              `• 빈 칸: ${emptyCells.length}개\n` +
              `• 대상 교사: ${eligible.length}명\n` +
              `• 현재 누적 (학기): ${minC}회 ~ ${maxC}회\n\n` +
              `규칙:\n` +
              `✓ 이미 배정된 칸은 건드리지 않음\n` +
              `✓ 같은 날 같은 사람 중복 금지\n` +
              `✓ 누적 적은 사람 우선 배정\n\n` +
              `계속하시겠습니까? (저장은 "모두 저장" 버튼으로)`;
  if(!confirm(msg)) return;
  
  // 공정 랜덤 배정 알고리즘
  // 1. 빈 칸을 날짜순 정렬 (같은 날 slot=0 먼저)
  emptyCells.sort((a,b)=>{
    if(a.date !== b.date) return a.date.localeCompare(b.date);
    return a.slot - b.slot;
  });
  
  // 2. 날짜별로 "이미 그 날에 배정된 사람" 집합 추적
  const dateAssigned = {}; // {date: Set of teacher names}
  weeks.forEach(week=>{
    week.forEach(dayInfo=>{
      if(!dayInfo.inMonth) return;
      dateAssigned[dayInfo.date] = new Set();
      [0,1].forEach(s=>{
        const info = getNightSupervisor(dayInfo.date, grade, s);
        if(info.teacher) dateAssigned[dayInfo.date].add(info.teacher);
      });
    });
  });
  
  // 3. 각 빈 칸에 대해 배정
  let assigned = 0, skipped = 0;
  const assignments = []; // [{date, slot, teacher}]
  
  for(const cell of emptyCells){
    // 후보: 해당 날짜에 아직 없는 교사
    const usedOnDate = dateAssigned[cell.date] || new Set();
    const candidates = eligible.map(t=>t.n).filter(n => !usedOnDate.has(n));
    
    if(candidates.length === 0){
      skipped++;
      continue;
    }
    
    // 누적 횟수 기준 최소값 찾기
    const minCount = Math.min(...candidates.map(n => counts[n] || 0));
    // 최소 횟수인 교사들
    const minGroup = candidates.filter(n => (counts[n] || 0) === minCount);
    
    // 같은 주 이미 배정된 사람은 후순위 (soft constraint)
    const cellWeekStart = getWeekStart(cell.date);
    const weekDates = [];
    for(let i=0;i<5;i++){
      const wd = new Date(cellWeekStart);
      wd.setDate(wd.getDate()+i);
      const ys = wd.getFullYear(), ms = String(wd.getMonth()+1).padStart(2,'0'), ds = String(wd.getDate()).padStart(2,'0');
      weekDates.push(`${ys}-${ms}-${ds}`);
    }
    const usedThisWeek = new Set();
    weekDates.forEach(wd=>{
      if(dateAssigned[wd]) dateAssigned[wd].forEach(n=>usedThisWeek.add(n));
    });
    // 먼저 "이번주에 없는 사람"을 선호, 없으면 전체에서 선택
    const freshInWeek = minGroup.filter(n=>!usedThisWeek.has(n));
    const pickPool = freshInWeek.length > 0 ? freshInWeek : minGroup;
    
    // 무작위 선택
    const picked = pickPool[Math.floor(Math.random() * pickPool.length)];
    
    // Pending에 추가
    setNightPending(cell.date, grade, cell.slot, picked);
    
    // 추적 업데이트
    usedOnDate.add(picked);
    counts[picked] = (counts[picked] || 0) + 1;
    assignments.push({date: cell.date, slot: cell.slot, teacher: picked});
    assigned++;
  }
  
  renderPreservingScroll();
  
  // 결과 알림
  const newMinC = Math.min(...Object.values(counts));
  const newMaxC = Math.max(...Object.values(counts));
  let resultMsg = `✅ 랜덤 배정 완료\n\n` +
                  `• 배정: ${assigned}개\n`;
  if(skipped > 0) resultMsg += `• 건너뜀: ${skipped}개 (후보 부족)\n`;
  resultMsg += `• 배정 후 누적: ${newMinC}회 ~ ${newMaxC}회\n\n` +
               `💡 결과를 확인한 뒤 "모두 저장"을 눌러주세요.\n` +
               `마음에 들지 않으면 "변경 취소"로 되돌릴 수 있습니다.`;
  alert(resultMsg);
}

// 학사일정 등록/수정 권한: 담임 + 학년부장 + 관리자
function canManageEvents(){
  if(!CURRENT_USER) return false;
  if(isAdmin() || isNightAdmin()) return true;
  const hr = CURRENT_USER.homeroom;
  if(!hr) return false;
  // 담임 (2-10 등) 또는 학년부장 (head-N)
  if(/^\d-\d+$/.test(hr)) return true;
  if(hr.startsWith('head-')) return true;
  return false;
}

// 이벤트가 특정 학년에 영향을 주는지 체크
// grades 배열이 없거나 비어있으면 "전체 학년" 영향으로 간주
function eventAppliesToGrade(event, grade){
  if(!grade) return true; // 학년 지정 없으면 모든 이벤트 포함
  const gs = event.grades;
  if(!gs || gs.length === 0) return true; // 전체 학년 영향
  return gs.includes(grade);
}

// 특정 날짜-학년에 야자가 블록되었는지
function isNightBlocked(date, grade){
  return getNightAffectingEvents(date, grade).length > 0;
}

// 특정 날짜-학년에 수업이 블록되었는지
function isClassBlocked(date, grade){
  return getClassAffectingEvents(date, grade).length > 0;
}

// 블록 사유 문자열 생성
function getBlockReason(date, grade, kind){
  const events = kind === 'night' ? getNightAffectingEvents(date, grade) : getClassAffectingEvents(date, grade);
  if(events.length === 0) return null;
  const titles = events.map(e => `${getEventTypeInfo(e.type).emoji} ${e.title}`).join(', ');
  return titles;
}

// 학년 배열을 읽기 좋게 포맷
function formatGrades(grades){
  if(!grades || grades.length === 0) return '전체 학년';
  const sorted = grades.slice().sort();
  return sorted.map(g=>g+'학년').join(',');
}

// 특정 날짜에 수업에 영향 주는 이벤트 (학년 필터 선택)
function getClassAffectingEvents(date, grade){
  const dateEvents = SCHOOL_EVENTS[date] || {};
  return Object.entries(dateEvents)
    .map(([id,e])=>({id,...e}))
    .filter(e => e.affectsClasses && eventAppliesToGrade(e, grade));
}

// 특정 날짜에 야자에 영향 주는 이벤트 (학년 필터 선택)
function getNightAffectingEvents(date, grade){
  const dateEvents = SCHOOL_EVENTS[date] || {};
  return Object.entries(dateEvents)
    .map(([id,e])=>({id,...e}))
    .filter(e => e.affectsNight && eventAppliesToGrade(e, grade));
}

// 특정 날짜의 모든 이벤트 (학년 필터 선택)
function getEventsForDate(date, grade){
  const dateEvents = SCHOOL_EVENTS[date] || {};
  return Object.entries(dateEvents)
    .map(([id,e])=>({id,...e}))
    .filter(e => eventAppliesToGrade(e, grade))
    .sort((a,b)=>(a.createdAt||'').localeCompare(b.createdAt||''));
}

// 순환 상태 변경
async function cycleAttendance(date, grade, period, studentId){
  // 학사일정 체크: 야자 영향 있는 날짜는 출석 체크 불가
  if(isNightBlocked(date, grade)){
    const reason = getBlockReason(date, grade, 'night');
    alert(`⚠️ 학사일정으로 인해 이 날짜는 야자 출석 체크를 할 수 없습니다.\n\n사유: ${reason}`);
    return;
  }
  const current = (NIGHT_ATTENDANCE[date] && NIGHT_ATTENDANCE[date][grade] && NIGHT_ATTENDANCE[date][grade][period] && NIGHT_ATTENDANCE[date][grade][period][studentId]) || null;
  const currentStatus = current ? current.status : null;
  // 순환: 미체크 → 출석 → 미출석 → 인정 → 미체크
  const cycle = [null, "present", "absent", "excused"];
  const idx = cycle.indexOf(currentStatus);
  const next = cycle[(idx + 1) % cycle.length];
  
  // 1. 로컬 상태 먼저 변경 (optimistic)
  if(!NIGHT_ATTENDANCE[date]) NIGHT_ATTENDANCE[date] = {};
  if(!NIGHT_ATTENDANCE[date][grade]) NIGHT_ATTENDANCE[date][grade] = {};
  if(!NIGHT_ATTENDANCE[date][grade][period]) NIGHT_ATTENDANCE[date][grade][period] = {};
  if(next === null){
    delete NIGHT_ATTENDANCE[date][grade][period][studentId];
  } else {
    NIGHT_ATTENDANCE[date][grade][period][studentId] = {
      status: next,
      checkedBy: CURRENT_USER ? (CURRENT_USER.teacherName || CURRENT_USER.email) : '',
      checkedAt: new Date().toISOString()
    };
  }
  
  // 2. 출석부 섹션만 부분 업데이트 (전체 render 안 함 → 스크롤 절대 안 튐)
  updateAttendanceBodyOnly(date, grade);
  
  // 3. Firebase 저장 (백그라운드, 실패 시 롤백)
  try{
    if(!next){
      await window.fb.remove(`nightAttendance/${date}/${grade}/${period}/${studentId}`);
    } else {
      const record = {
        status: next,
        checkedBy: CURRENT_USER ? (CURRENT_USER.teacherName || CURRENT_USER.email) : '',
        checkedAt: new Date().toISOString()
      };
      await window.fb.set(`nightAttendance/${date}/${grade}/${period}/${studentId}`, record);
    }
  }catch(e){
    if(e.message && e.message.includes("PERMISSION_DENIED")){
      alert("⚠️ Firebase 보안 규칙에 nightAttendance 경로를 추가해주세요");
    } else {
      alert("저장 실패: "+e.message);
    }
  }
}

// 학생 데이터의 schedule 필드를 정규화
// 구버전(periods+days) → 신버전(schedule) 자동 변환
function normalizeStudentSchedule(s){
  // 이미 schedule 형태면 그대로
  if(s.schedule && typeof s.schedule === 'object' && !Array.isArray(s.schedule)){
    return s.schedule;
  }
  // 구버전: periods [1,2,3] + days ["월","화"]
  const periods = s.periods || [1,2,3];
  const days = s.days && s.days.length > 0 ? s.days : ['월','화','수','목','금'];
  const sched = {};
  days.forEach(d => {sched[d] = [...periods]});
  return sched;
}

// schedule을 "월:123 화:12" 같은 요약 문자열로
function formatSchedule(schedule){
  if(!schedule) return '';
  const dayOrder = ['월','화','수','목','금'];
  const parts = [];
  dayOrder.forEach(d=>{
    const ps = schedule[d];
    if(ps && ps.length > 0){
      parts.push(`${d}:${ps.slice().sort().join('')}`);
    }
  });
  return parts.join(' ');
}

// 특정 날짜에 적용되는 주차 키를 찾음 (date ≤ weekStart 인 가장 최신 주차)
function getEffectiveWeekForDate(grade, date){
  const weeksData = NIGHT_STUDENTS[grade] || {};
  const weekKeys = Object.keys(weeksData).filter(k => /^\d{4}-\d{2}-\d{2}$/.test(k));
  if(weekKeys.length === 0) return null;
  // date 이하인 주차 중 가장 최신
  const applicable = weekKeys.filter(k => k <= date).sort();
  if(applicable.length === 0) return null;
  return applicable[applicable.length - 1];
}

// 주차 목록 (최신순)
function getAvailableWeeks(grade){
  const weeksData = NIGHT_STUDENTS[grade] || {};
  const weekKeys = Object.keys(weeksData).filter(k => /^\d{4}-\d{2}-\d{2}$/.test(k));
  return weekKeys.sort().reverse();
}

// 특정 주차의 명단 조회
function getStudentsForWeek(grade, weekStart){
  if(!weekStart) return [];
  const students = (NIGHT_STUDENTS[grade] && NIGHT_STUDENTS[grade][weekStart]) || {};
  const list = Object.entries(students)
    .map(([id, s]) => ({id, ...s}))
    .filter(s => s.active !== false);
  list.sort((a,b)=>{
    const placeCompare = (a.place||'').localeCompare(b.place||'');
    if(placeCompare !== 0) return placeCompare;
    const classCompare = (a.classNum||'').localeCompare(b.classNum||'');
    if(classCompare !== 0) return classCompare;
    return (a.number||0) - (b.number||0);
  });
  return list;
}

// 특정 날짜에 적용되는 학생 명단 (주차 자동 적용)
function getActiveStudents(grade, date){
  if(!date) date = todayStr();
  const weekStart = getEffectiveWeekForDate(grade, date);
  if(!weekStart) return [];
  return getStudentsForWeek(grade, weekStart);
}

// 날짜(요일), 교시에 참여하는 학생 필터 (schedule 기반)
function getStudentsForAttendance(grade, date, period){
  const all = getActiveStudents(grade, date);
  const [y,m,d] = date.split('-').map(Number);
  const dow = new Date(y,m-1,d).getDay();
  const dayLabels = ['일','월','화','수','목','금','토'];
  const dayChar = dayLabels[dow];
  
  return all.filter(s=>{
    const sched = normalizeStudentSchedule(s);
    const periodsForDay = sched[dayChar];
    if(!periodsForDay || periodsForDay.length === 0) return false;
    return periodsForDay.includes(period);
  });
}

// 주차 date picker 적용
function applyMgrWeekPicker(){
  const el = document.getElementById('mgr_week_picker');
  if(!el) return;
  const val = el.value;
  if(!val) return;
  // 해당 날짜의 월요일로 강제 이동
  NIGHT_MGR_WEEK = getWeekStart(val);
  renderPreservingScroll();
}

// 상속 받은 명단을 이 주차로 복사
async function createWeekFromInherited(grade, targetWeek, sourceWeek){
  if(!isNightAdmin()){alert("야자 관리자 권한 필요");return}
  const srcList = getStudentsForWeek(grade, sourceWeek);
  if(srcList.length === 0){alert("원본 명단이 비어있습니다");return}
  if(!confirm(`${sourceWeek} 주차 명단 ${srcList.length}명을 ${targetWeek} 주차로 복사할까요?\n이 주차부터는 독립적으로 수정할 수 있습니다.`))return;
  const ok = await copyWeekToNew(grade, sourceWeek, targetWeek);
  if(ok){
    NIGHT_MGR_WEEK = targetWeek;
    renderPreservingScroll();
  }
}

// 주차 복사 실행
async function doWeekCopy(grade){
  const srcEl = document.getElementById('copy_src');
  const dstEl = document.getElementById('copy_dst');
  if(!srcEl || !dstEl) return;
  const src = srcEl.value;
  const dstRaw = dstEl.value;
  if(!src || !dstRaw){alert("원본과 대상 주차를 지정하세요");return}
  const dst = getWeekStart(dstRaw);
  if(src === dst){alert("원본과 대상이 같습니다");return}
  const existing = NIGHT_STUDENTS[grade] && NIGHT_STUDENTS[grade][dst];
  if(existing && Object.keys(existing).length > 0){
    if(!confirm(`${dst} 주차에 이미 ${Object.keys(existing).length}명이 있습니다.\n덮어쓸까요?`))return;
  }
  const ok = await copyWeekToNew(grade, src, dst);
  if(ok){
    NIGHT_MGR_WEEK = dst;
    alert(`✅ ${src} → ${dst} 복사 완료`);
    renderPreservingScroll();
  }
}



// ===== 엑셀 다운로드/업로드 =====

// 엑셀 양식 다운로드 (요일별 컬럼: 반/번호/이름/장소/월/화/수/목/금)
function downloadNightStudentsExcel(grade, weekStart, withCurrentData){
  if(typeof XLSX === 'undefined'){
    alert("엑셀 라이브러리 로드 실패. 인터넷 연결 후 새로고침하세요.");
    return;
  }
  
  const headers = ['반', '번호', '이름', '장소', '월', '화', '수', '목', '금'];
  const rows = [headers];
  const dayOrder = ['월','화','수','목','금'];
  
  if(withCurrentData && weekStart){
    const students = getStudentsForWeek(grade, weekStart);
    students.forEach(s=>{
      const sched = normalizeStudentSchedule(s);
      const dayCells = dayOrder.map(d=>{
        const ps = sched[d];
        if(!ps || ps.length === 0) return '';
        return ps.slice().sort().join(' ');
      });
      rows.push([
        s.classNum || '',
        s.number || '',
        s.name || '',
        s.place || '',
        ...dayCells
      ]);
    });
  } else {
    // 빈 양식: 예시
    rows.push([`${grade}-3`, 15, '홍길동(예시)', '도서관', '1 2 3', '1 2', '1 2 3', '', '2 3']);
    rows.push([`${grade}-5`, 3, '박지민(예시)', '독서실', '1 2 3', '1 2 3', '1 2 3', '1 2 3', '1 2 3']);
    rows.push([`${grade}-7`, 22, '김영수(예시)', '2학년교실', '1 2', '', '1 2', '', '1 2']);
  }
  
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:8},{wch:6},{wch:12},{wch:14},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10}];
  
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, `${grade}학년 야자명단`);
  
  const weekLabel = weekStart ? `_${weekStart}주차` : '';
  const typeLabel = withCurrentData ? '_현재명단' : '_빈양식';
  const fname = `야자명단_${grade}학년${typeLabel}${weekLabel}.xlsx`;
  XLSX.writeFile(wb, fname);
}

function handleNightStudentsUpload(event, grade, weekStart){
  if(typeof XLSX === 'undefined'){
    alert("엑셀 라이브러리 로드 실패. 인터넷 연결 후 새로고침하세요.");
    return;
  }
  const file = event.target.files[0];
  if(!file){return}
  if(!weekStart){alert("적용할 주차를 먼저 선택하세요");return}
  
  const reader = new FileReader();
  reader.onload = async (e)=>{
    try{
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      
      if(rows.length < 2){alert("데이터가 없습니다 (헤더만 있음)");return}
      
      // 첫 번째 줄은 헤더로 가정
      const header = rows[0].map(h => String(h).trim());
      const dataRows = rows.slice(1).filter(r => r.some(c => String(c).trim() !== ''));
      
      // 컬럼 인덱스 찾기
      // 필수: 반, 번호, 이름
      // 장소 (선택)
      // 요일별 교시 컬럼: 월/화/수/목/금 (신형)
      // 또는 구형: 교시 + 요일 (fallback)
      const idx = {
        class: header.findIndex(h => h.includes('반')),
        number: header.findIndex(h => h.includes('번호')),
        name: header.findIndex(h => h.includes('이름')),
        place: header.findIndex(h => h.includes('장소')),
        mon: header.findIndex(h => h === '월' || h.startsWith('월')),
        tue: header.findIndex(h => h === '화' || h.startsWith('화')),
        wed: header.findIndex(h => h === '수' || h.startsWith('수')),
        thu: header.findIndex(h => h === '목' || h.startsWith('목')),
        fri: header.findIndex(h => h === '금' || h.startsWith('금')),
        // 구형 호환
        period: header.findIndex(h => h.includes('교시')),
        day: header.findIndex(h => h.includes('요일'))
      };
      if(idx.class < 0 || idx.number < 0 || idx.name < 0){
        alert("필수 컬럼 누락: 반, 번호, 이름은 반드시 있어야 합니다.\n\n현재 헤더: " + header.join(', '));
        return;
      }
      
      const dayColMap = [['월', idx.mon], ['화', idx.tue], ['수', idx.wed], ['목', idx.thu], ['금', idx.fri]];
      const hasDayColumns = dayColMap.some(([,i]) => i >= 0);
      
      // 셀 값을 교시 배열로 파싱
      function parsePeriodsCell(val){
        const s = String(val||'').trim();
        if(!s) return [];
        const periods = [];
        if(s.match(/[,\s]/)){
          s.split(/[,\s]+/).forEach(tok=>{
            const n = parseInt(tok);
            if([1,2,3].includes(n) && !periods.includes(n)) periods.push(n);
          });
        } else {
          for(const ch of s){
            const n = parseInt(ch);
            if([1,2,3].includes(n) && !periods.includes(n)) periods.push(n);
          }
        }
        return periods;
      }
      
      const parsed = [];
      const errors = [];
      
      dataRows.forEach((row, ri)=>{
        const classNum = String(row[idx.class]||'').trim();
        const numberRaw = row[idx.number];
        const number = parseInt(numberRaw);
        const name = String(row[idx.name]||'').trim();
        const place = idx.place >= 0 ? String(row[idx.place]||'').trim() : '';
        
        if(!classNum){errors.push(`${ri+2}행: 반 누락`);return}
        if(!classNum.match(/^\d-\d+$/)){errors.push(`${ri+2}행: 반 형식 오류 → "${classNum}"`);return}
        if(isNaN(number) || number < 1){errors.push(`${ri+2}행: 번호 오류 → "${numberRaw}"`);return}
        if(!name || name.includes('예시')){return}
        
        // schedule 파싱
        const schedule = {};
        if(hasDayColumns){
          // 신형: 요일별 컬럼
          dayColMap.forEach(([day, colIdx])=>{
            if(colIdx >= 0){
              const periods = parsePeriodsCell(row[colIdx]);
              if(periods.length > 0) schedule[day] = periods;
            }
          });
        } else {
          // 구형 fallback: 교시+요일 컬럼
          const periodsStr = idx.period >= 0 ? String(row[idx.period]||'').trim() : '';
          const daysStr = idx.day >= 0 ? String(row[idx.day]||'').trim() : '';
          let periods = parsePeriodsCell(periodsStr);
          if(periods.length === 0) periods = [1,2,3];
          const days = [];
          if(daysStr){
            for(const ch of daysStr){
              if('월화수목금'.includes(ch) && !days.includes(ch)) days.push(ch);
            }
          }
          const finalDays = days.length > 0 ? days : ['월','화','수','목','금'];
          finalDays.forEach(d => {schedule[d] = [...periods]});
        }
        
        if(Object.keys(schedule).length === 0){
          errors.push(`${ri+2}행 (${name}): 요일별 교시가 모두 비어있음`);
          return;
        }
        
        const studentId = `${classNum}-${String(number).padStart(2,'0')}`;
        const data = {name, classNum, number, active: true, schedule};
        if(place) data.place = place;
        parsed.push({studentId, data});
      });
      
      if(parsed.length === 0){
        alert("유효한 데이터가 없습니다.\n" + (errors.length > 0 ? "오류:\n" + errors.slice(0,10).join('\n') : ""));
        return;
      }
      
      // 기존 주차 명단과 교체 여부 확인
      const existing = (NIGHT_STUDENTS[grade] && NIGHT_STUDENTS[grade][weekStart]) || {};
      const existingCount = Object.keys(existing).length;
      
      let msg = `📥 엑셀 업로드 확인\n\n`;
      msg += `• 주차: ${weekStart}\n`;
      msg += `• 읽은 학생: ${parsed.length}명\n`;
      if(errors.length > 0) msg += `• 오류(건너뜀): ${errors.length}건\n`;
      msg += `\n`;
      
      let mode = 'replace';
      if(existingCount > 0){
        msg += `해당 주차에 이미 ${existingCount}명이 등록되어 있습니다.\n\n`;
        msg += `[확인] = 전체 교체 (기존 삭제 후 새로)\n`;
        msg += `[취소] = 중단`;
        if(!confirm(msg)) return;
        mode = 'replace';
      } else {
        msg += `확인 후 저장됩니다.`;
        if(!confirm(msg)) return;
      }
      
      // 저장 (전체 교체)
      const newData = {};
      parsed.forEach(p => {newData[p.studentId] = p.data});
      try{
        await window.fb.set(`nightStudents/${grade}/${weekStart}`, newData);
        let resultMsg = `✅ 업로드 완료\n\n성공: ${parsed.length}명`;
        if(errors.length > 0) resultMsg += `\n건너뜀: ${errors.length}건`;
        if(errors.length > 0 && errors.length <= 20){
          resultMsg += `\n\n오류 내역:\n` + errors.join('\n');
        }
        alert(resultMsg);
      }catch(err){
        alert("저장 실패: " + err.message);
      }
      
      // input 리셋
      event.target.value = '';
    }catch(err){
      alert("파일 처리 실패: " + err.message);
      event.target.value = '';
    }
  };
  reader.readAsArrayBuffer(file);
}

// 학생 편집 시작
function startStudentEdit(grade, weekStart, studentId){
  NIGHT_EDIT_STUDENT = `${grade}|${weekStart}|${studentId}`;
  renderPreservingScroll();
}

// 학생 편집 저장
async function saveStudentEdit(grade, weekStart, studentId){
  const existing = NIGHT_STUDENTS[grade] && NIGHT_STUDENTS[grade][weekStart] && NIGHT_STUDENTS[grade][weekStart][studentId];
  if(!existing){alert("학생 정보를 찾을 수 없습니다");return}
  
  // 장소 읽기
  const placeEl = document.getElementById(`editStu_place_${studentId}`);
  const place = placeEl ? placeEl.value.trim() : '';
  
  // 요일별 교시 읽기
  const schedule = {};
  ['월','화','수','목','금'].forEach(d=>{
    const periodsForDay = [1,2,3].filter(p=>{
      const el = document.getElementById(`editStu_sched_${studentId}_${d}_${p}`);
      return el && el.checked;
    });
    if(periodsForDay.length > 0) schedule[d] = periodsForDay;
  });
  
  if(Object.keys(schedule).length === 0){
    if(!confirm("요일별 교시가 모두 비어있습니다. 그래도 저장할까요? (학생이 모든 요일 미신청 상태가 됩니다)")) return;
  }
  
  // 기존 데이터 유지 + 새 값 덮어쓰기 (name, classNum, number, active 보존)
  const data = {
    name: existing.name,
    classNum: existing.classNum,
    number: existing.number,
    active: existing.active !== false,
    schedule
  };
  if(place) data.place = place;
  // 기존의 periods/days 필드는 자연스레 제거 (새 schedule로 통일)
  
  const ok = await saveNightStudent(grade, weekStart, studentId, data);
  if(ok){
    NIGHT_EDIT_STUDENT = null;
    renderPreservingScroll();
  }
}

async function addNightStudent(grade){
  const weekStart = NIGHT_MGR_WEEK;
  if(!weekStart){alert("먼저 적용 주차를 선택하세요");return}
  
  const classNum = document.getElementById('newStu_class').value.trim();
  const number = parseInt(document.getElementById('newStu_number').value);
  const name = document.getElementById('newStu_name').value.trim();
  const place = document.getElementById('newStu_place').value.trim();
  
  // 요일별 교시: newStu_sched_{day}_{period}
  const schedule = {};
  ['월','화','수','목','금'].forEach(d=>{
    const periodsForDay = [1,2,3].filter(p=>{
      const el = document.getElementById(`newStu_sched_${d}_${p}`);
      return el && el.checked;
    });
    if(periodsForDay.length > 0) schedule[d] = periodsForDay;
  });
  
  if(!name){alert("이름을 입력하세요");return}
  if(!classNum){alert("반을 입력하세요 (예: "+grade+"-3)");return}
  if(!number){alert("번호를 입력하세요");return}
  if(Object.keys(schedule).length === 0){alert("최소 1개 요일에 1개 교시 이상 선택하세요");return}
  const studentId = `${classNum}-${String(number).padStart(2,'0')}`;
  const existing = NIGHT_STUDENTS[grade] && NIGHT_STUDENTS[grade][weekStart] && NIGHT_STUDENTS[grade][weekStart][studentId];
  if(existing){
    if(!confirm(`이미 등록된 학생입니다 (${existing.name}). 덮어쓸까요?`))return;
  }
  const data = {name, classNum, number, active: true, schedule};
  if(place) data.place = place;
  const ok = await saveNightStudent(grade, weekStart, studentId, data);
  if(ok){
    document.getElementById('newStu_class').value = '';
    document.getElementById('newStu_number').value = '';
    document.getElementById('newStu_name').value = '';
    document.getElementById('newStu_name').focus();
  }
}

// 개별 추가 폼의 모든 요일×교시 체크박스 일괄 토글
function setAllSchedCheckboxes(checked){
  ['월','화','수','목','금'].forEach(d=>{

      if(el) el.checked = checked;

}

// === 일괄 입력 처리 ===
async function processBulkImport(grade){
  const weekStart = NIGHT_MGR_WEEK;
  if(!weekStart){alert("먼저 적용 주차를 선택하세요");return}
  const text = document.getElementById('bulkImport_text').value.trim();
  if(!text){alert("입력 내용이 없습니다");return}
  
  const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  if(lines.length === 0){alert("입력 내용이 없습니다");return}
  
  const parsed = [];
  const errors = [];
  
  function parsePeriodsStr(s){
    s = String(s||'').trim();
    if(!s) return [];
    const periods = [];
    if(s.match(/[,\s]/)){
      s.split(/[,\s]+/).forEach(tok=>{
        const n = parseInt(tok);
        if([1,2,3].includes(n) && !periods.includes(n)) periods.push(n);
      });
    } else {
      for(const ch of s){
        const n = parseInt(ch);
        if([1,2,3].includes(n) && !periods.includes(n)) periods.push(n);
      }
    }
    return periods;
  }
  
  lines.forEach((line, idx)=>{
    // 탭 또는 쉼표로 분리
    const cols = line.split(/[,\t]/).map(c => c.trim());
    if(cols.length < 3){
      errors.push(`줄 ${idx+1}: 반/번호/이름이 모두 필요합니다 → "${line}"`);
      return;
    }
    
    const classNum = cols[0];
    const number = parseInt(cols[1]);
    const name = cols[2];
    const place = cols[3] || '';
    // 새 형식: cols[4~8] = 월/화/수/목/금 각각 교시
    const monStr = cols[4] || '';
    const tueStr = cols[5] || '';
    const wedStr = cols[6] || '';
    const thuStr = cols[7] || '';
    const friStr = cols[8] || '';
    
    if(!classNum.match(/^\d-\d+$/)){
      errors.push(`줄 ${idx+1}: 반 형식 오류 (예: ${grade}-3) → "${classNum}"`);
      return;
    }
    if(isNaN(number) || number < 1){
      errors.push(`줄 ${idx+1}: 번호 오류 → "${cols[1]}"`);
      return;
    }
    if(!name){
      errors.push(`줄 ${idx+1}: 이름 누락`);
      return;
    }
    
    const schedule = {};
    const pairs = [['월',monStr],['화',tueStr],['수',wedStr],['목',thuStr],['금',friStr]];
    pairs.forEach(([day, str])=>{
      const ps = parsePeriodsStr(str);
      if(ps.length > 0) schedule[day] = ps;
    });
    
    if(Object.keys(schedule).length === 0){
      errors.push(`줄 ${idx+1} (${name}): 요일별 교시가 모두 비어있음`);
      return;
    }
    
    const studentId = `${classNum}-${String(number).padStart(2,'0')}`;
    const data = {name, classNum, number, active: true, schedule};
    if(place) data.place = place;
    parsed.push({studentId, data, line});
  });
  
  if(errors.length > 0){
    const showErrors = errors.slice(0, 10).join('\n');
    if(!confirm(`⚠️ ${errors.length}개 줄에 오류가 있습니다:\n\n${showErrors}${errors.length>10?'\n...외 '+(errors.length-10)+'건':''}\n\n오류 줄은 건너뛰고 ${parsed.length}명만 추가할까요?`)){
      return;
    }
  }
  
  if(parsed.length === 0){alert("추가할 학생이 없습니다");return}
  
  // 중복 확인
  const weekData = (NIGHT_STUDENTS[grade] && NIGHT_STUDENTS[grade][weekStart]) || {};
  const duplicates = parsed.filter(p => weekData[p.studentId]);
  if(duplicates.length > 0){
    const dupNames = duplicates.slice(0,5).map(d => `${d.data.classNum} ${d.data.number}번 ${d.data.name}`).join(', ');
    if(!confirm(`⚠️ 이미 등록된 학생 ${duplicates.length}명이 있습니다:\n${dupNames}${duplicates.length>5?' ...':''}\n\n덮어쓸까요?`)){
      return;
    }
  }
  
  // 저장
  let ok = 0, fail = 0;
  for(const p of parsed){
    const success = await saveNightStudent(grade, weekStart, p.studentId, p.data);
    if(success) ok++;
    else fail++;
  }
  
  alert(`✅ 일괄 입력 완료\n\n성공: ${ok}명\n실패: ${fail}명\n오류: ${errors.length}줄`);
  
  if(ok > 0){
    document.getElementById('bulkImport_text').value = '';
    NIGHT_BULK_IMPORT_OPEN = false;
    renderPreservingScroll();
  }
}

// 출석부 섹션 렌더 (교시별, 장소별 그룹화)
function renderAttendanceSection(date, grade){
  // 편집 모드면 명단 관리 UI로 전환
  if(NIGHT_STUDENT_MGR_OPEN && isNightAdmin()){
    let h = '';
    h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px">';
    h += `<div style="font-size:13px;font-weight:700;color:#e65100">✏️ ${grade}학년 야자 명단 편집</div>`;
    h += `<button class="btn btn-sm" style="background:#2e7d32;color:#fff;font-size:11px" onclick="NIGHT_STUDENT_MGR_OPEN=false;NIGHT_EDIT_STUDENT=null;NIGHT_BULK_IMPORT_OPEN=false;NIGHT_MGR_WEEK=null;renderPreservingScroll()">✅ 편집 완료</button>`;
    h += '</div>';
    h += renderStudentManager(grade);
    return h;
  }
  
  const period = NIGHT_ATT_PERIOD;
  const allActive = getActiveStudents(grade);
  const students = getStudentsForAttendance(grade, date, period);
  const todayAtt = (NIGHT_ATTENDANCE[date] && NIGHT_ATTENDANCE[date][grade] && NIGHT_ATTENDANCE[date][grade][period]) || {};
  
  // 날짜에서 요일 추출
  const [y,m,d] = date.split('-').map(Number);
  const dow = new Date(y,m-1,d).getDay();
  const dayLabels = ['일','월','화','수','목','금','토'];
  const dayChar = dayLabels[dow];
  
  let h = '';
  
  // 헤더 (평상시 모드)
  h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px">';
  h += `<div style="font-size:13px;font-weight:700;color:#1a237e">📋 ${grade}학년 야자 출석부</div>`;
  if(isNightAdmin()){
    h += `<button class="btn btn-sm btn-outline" style="font-size:11px;color:#e65100;border-color:#ff9800" onclick="NIGHT_STUDENT_MGR_OPEN=true;renderPreservingScroll()">✏️ 명단 편집</button>`;
  }
  h += '</div>';
  
  // 야자 영향 이벤트 체크 (현재 학년만)
  const nightEvs = getNightAffectingEvents(date, grade);
  if(nightEvs.length > 0){
    nightEvs.forEach(ev=>{
      const eInfo = getEventTypeInfo(ev.type);
      const gLabel = ev.grades && ev.grades.length > 0 ? ` · ${formatGrades(ev.grades)}` : '';
      h += `<div style="background:${eInfo.bg};color:${eInfo.color};padding:10px 12px;border-radius:8px;margin-bottom:8px;border:2px solid ${eInfo.color};font-size:13px;font-weight:700">`;
      h += `🚫 ${eInfo.emoji} ${ev.title}${gLabel}`;
      if(ev.note) h += `<div style="font-size:11px;font-weight:400;margin-top:4px">${ev.note}</div>`;
      h += `<div style="font-size:11px;font-weight:600;margin-top:6px;color:#c62828">🌙 이 날짜 ${grade}학년 야자는 진행되지 않습니다. 출석 체크 불가.</div>`;
      h += `</div>`;
    });
    // 학생 목록 렌더링 스킵
    return h;
  }
  
  // 적용 주차 표시 (상속 여부)
  const effectiveWeek = getEffectiveWeekForDate(grade, date);
  const dateWeekStart = getWeekStart(date);
  if(effectiveWeek){
    const [wy,wm,wd] = effectiveWeek.split('-').map(Number);
    const isInherited = effectiveWeek !== dateWeekStart;
    if(isInherited){
      h += `<div style="font-size:10px;color:#1565c0;margin-bottom:6px">📅 적용 명단: ${wm}/${wd} 주차 🔗 상속 중</div>`;
    } else {
      h += `<div style="font-size:10px;color:#86868b;margin-bottom:6px">📅 적용 명단: ${wm}/${wd} 주차</div>`;
    }
  }
  
  if(allActive.length === 0){
    h += '<div style="padding:14px;text-align:center;background:#fff3e0;color:#e65100;border-radius:8px;font-size:12px">';
    h += '⚠️ 이 날짜에 적용되는 주차 명단이 없습니다.';
    if(isNightAdmin()) h += '<br>위 "📇 명단 관리" 버튼으로 주차를 생성하고 학생을 등록해주세요.';
    h += '</div>';
    return h;
  }
  
  // 교시 선택 탭 (체크 상태 포함)
  h += '<div style="display:flex;gap:4px;margin-bottom:8px">';
  [1,2,3].forEach(p=>{
    const active = period === p;
    const studentsP = getStudentsForAttendance(grade, date, p);
    const countP = studentsP.length;
    // 체크 완료 인원
    const attP = (NIGHT_ATTENDANCE[date] && NIGHT_ATTENDANCE[date][grade] && NIGHT_ATTENDANCE[date][grade][p]) || {};
    let checkedCnt = 0;
    studentsP.forEach(s=>{
      if(attP[s.id] && attP[s.id].status) checkedCnt++;
    });
    const allDone = countP > 0 && checkedCnt === countP;
    const label = countP === 0 ? `${p}교시 (0)` : `${p}교시 ${checkedCnt}/${countP}${allDone?' ✓':''}`;
    const bg = active ? '#1a237e' : (allDone ? '#e8f5e9' : '#fff');
    const fg = active ? '#fff' : (allDone ? '#2e7d32' : '#424245');
    const bd = active ? '#1a237e' : (allDone ? '#81c784' : '#e5e5ea');
    h += `<button onclick="NIGHT_ATT_PERIOD=${p};renderPreservingScroll()" style="flex:1;padding:8px 4px;font-size:12px;font-weight:700;border-radius:8px;border:2px solid ${bd};background:${bg};color:${fg};cursor:pointer">${label}</button>`;
  });
  h += '</div>';
  
  h += `<div class="help-text" style="font-size:10px">💡 ${dayChar}요일 ${period}교시 신청자 ${students.length}명 · 탭: 미체크→출석→미출석→인정</div>`;
  
  if(students.length === 0){
    h += '<div style="padding:14px;text-align:center;background:#f5f5f7;color:#86868b;border-radius:8px;font-size:12px">';
    h += `오늘 ${dayChar}요일 ${period}교시에 신청한 학생이 없습니다.`;
    h += '</div>';
    return h;
  }
  
  // 요약 통계
  const counts = {present:0, late:0, absent:0, excused:0, unchecked:0};
  students.forEach(s=>{
    const rec = todayAtt[s.id];
    if(!rec || !rec.status) counts.unchecked++;
    else if(counts[rec.status] !== undefined) counts[rec.status]++;
  });
  // 표시 순서: 출석, 미출석, 인정, (지각 - 데이터 있을 때만), 미체크
  const statOrder = ['present','absent','excused'];
  if(counts.late > 0) statOrder.push('late');
  h += '<div style="display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap">';
  statOrder.forEach(key=>{
    const cfg = ATT_LABELS[key];
    h += `<div style="flex:1;min-width:60px;padding:6px;background:${cfg.bg};border-radius:6px;text-align:center">`;
    h += `<div style="font-size:16px;font-weight:800;color:${cfg.color}">${counts[key]}</div>`;
    h += `<div style="font-size:10px;color:${cfg.color}">${cfg.emoji}${cfg.label}</div>`;
    h += `</div>`;
  });
  h += `<div style="flex:1;min-width:60px;padding:6px;background:#f5f5f7;border-radius:6px;text-align:center">`;
  h += `<div style="font-size:16px;font-weight:800;color:#86868b">${counts.unchecked}</div>`;
  h += `<div style="font-size:10px;color:#86868b">미체크</div>`;
  h += `</div>`;
  h += '</div>';
  
  // 장소별 그룹화 (장소가 최우선)
  const byPlace = {};
  students.forEach(s=>{
    const k = s.place || '(장소 미지정)';
    if(!byPlace[k]) byPlace[k] = [];
    byPlace[k].push(s);
  });
  
  h += '<div style="max-height:420px;overflow-y:auto">';
  Object.keys(byPlace).sort().forEach(place=>{
    h += `<div style="font-size:12px;font-weight:700;color:#1a237e;padding:8px 6px;background:#e3f2fd;border-radius:6px;margin-top:8px;display:flex;justify-content:space-between;align-items:center">`;
    h += `<span>📍 ${place}</span>`;
    h += `<span style="font-size:10px;background:#1565c0;color:#fff;padding:2px 8px;border-radius:8px">${byPlace[place].length}명</span>`;
    h += `</div>`;
    h += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:4px;padding:4px 0">';
    byPlace[place].forEach(s=>{
      const rec = todayAtt[s.id];
      const status = rec ? rec.status : null;
      const cfg = status ? ATT_LABELS[status] : null;
      const bgC = cfg ? cfg.bg : '#fff';
      const fgC = cfg ? cfg.color : '#424245';
      const bdC = cfg ? cfg.color : '#e5e5ea';
      const emoji = cfg ? cfg.emoji : '⬜';
      const label = cfg ? cfg.label : '미체크';
      h += `<button onclick="cycleAttendance('${date}',${grade},${period},'${s.id}')" style="background:${bgC};color:${fgC};border:1.5px solid ${bdC};border-radius:6px;padding:6px 8px;text-align:left;cursor:pointer;font-size:12px;line-height:1.3;display:flex;align-items:center;gap:4px" title="${s.name} (${s.classNum} ${s.number}번, ${place}): ${label}">`;
      h += `<span style="font-size:14px">${emoji}</span>`;
      h += `<span style="flex:1;font-weight:${status?'700':'400'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap"><span style="opacity:.6;font-size:10px">${s.classNum||''}</span> ${s.number?s.number+' ':''}${s.name}</span>`;
      h += `</button>`;
    });
    h += '</div>';
  });
  h += '</div>';
  
  // 체크한 사람 표시
  const checkers = new Set();
  Object.values(todayAtt).forEach(rec=>{
    if(rec && rec.checkedBy) checkers.add(rec.checkedBy);
  });
  if(checkers.size > 0){
    h += `<div style="font-size:10px;color:#86868b;margin-top:8px;text-align:right">체크: ${Array.from(checkers).join(', ')}</div>`;
  }
  
  return h;
}

function toggleBulkMode(){
  if(NIGHT_BULK_MODE && Object.keys(NIGHT_PENDING).length > 0){
    if(!confirm(`미저장 변경 ${Object.keys(NIGHT_PENDING).length}건이 있습니다.\n버리고 일반 모드로 돌아갈까요?`))return;
    NIGHT_PENDING = {};
  }
  NIGHT_BULK_MODE = !NIGHT_BULK_MODE;
  NIGHT_SWAP_TARGET = null;
  // PC 와이드 레이아웃 토글
  if(NIGHT_BULK_MODE){
    document.body.classList.add('bulk-mode');
  } else {
    document.body.classList.remove('bulk-mode');
  }
  render();
}

// ========== TAB: 학사일정 ==========
function renderEventsTab(){
  let h = '';
  const today = todayStr();
  
  // 기본 달
  if(!EVENT_MONTH){
    const n = new Date();
    EVENT_MONTH = `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;
  }
  const currentMonth = EVENT_MONTH;
  
  // 헤더
  h += '<div class="class-badge" style="background:linear-gradient(135deg,#6a1b9a 0%,#4a148c 100%)">';
  h += '<h3>📅 학사일정</h3>';
  const [cy, cm] = currentMonth.split('-');
  h += `<div class="sub">${cy}년 ${parseInt(cm)}월</div>`;
  h += '</div>';
  
  // 월 이동
  h += '<div class="card" style="padding:10px 12px;margin-bottom:8px">';
  h += '<div style="display:flex;gap:6px;align-items:center">';
  h += `<button class="qa-btn" style="padding:6px 12px;font-size:12px" onclick="changeEventMonth(-1)">◀ 이전달</button>`;
  h += `<div style="flex:1;text-align:center;font-size:13px;font-weight:700;color:#4a148c">${currentMonth}</div>`;
  h += `<button class="qa-btn" style="padding:6px 12px;font-size:12px" onclick="changeEventMonth(1)">다음달 ▶</button>`;
  h += '</div>';
  h += `<button class="qa-btn" style="width:100%;margin-top:4px;padding:5px;font-size:11px" onclick="EVENT_MONTH=null;render()">오늘로</button>`;
  h += '</div>';
  
  // 권한 안내
  if(!canManageEvents()){
    h += '<div class="card" style="background:#fff3e0;padding:8px 12px;margin-bottom:8px">';
    h += '<div style="font-size:11px;color:#e65100">💡 학사일정 등록/수정은 담임, 학년부장, 관리자만 가능합니다 (조회는 모두 가능)</div>';
    h += '</div>';
  }
  
  // 월간 달력 (월~금만, 요일 헤더 포함)
  const weeks = getMonthWeeks(currentMonth);
  h += '<div class="card">';
  h += `<div class="card-title">📆 ${parseInt(cm)}월 일정</div>`;
  h += '<div class="help-text">💡 날짜 클릭 → 일정 추가/편집 · 학사일정은 시간표와 야자에 연동됩니다</div>';
  
  // 요일 헤더
  h += '<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-bottom:4px">';
  ['월','화','수','목','금'].forEach(d=>{
    h += `<div style="text-align:center;font-size:11px;font-weight:700;color:#86868b;padding:4px">${d}</div>`;
  });
  h += '</div>';
  
  weeks.forEach(week=>{
    h += '<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-bottom:3px">';
    week.forEach(dayInfo=>{
      const isToday = dayInfo.date === today;
      const events = getEventsForDate(dayInfo.date);
      const bg = dayInfo.inMonth ? '#fff' : '#f5f5f7';
      const border = isToday ? '#6a1b9a' : '#e5e5ea';
      const opacity = dayInfo.inMonth ? 1 : 0.3;
      const clickable = dayInfo.inMonth && canManageEvents();
      
      h += `<div onclick="${clickable?`EVENT_ADD_DATE='${dayInfo.date}';render()`:''}" style="background:${bg};border:2px solid ${border};border-radius:8px;padding:6px 4px;min-height:85px;opacity:${opacity};font-size:11px;cursor:${clickable?'pointer':'default'}">`;
      h += `<div style="font-size:11px;font-weight:700;color:${isToday?'#6a1b9a':'#424245'};margin-bottom:4px">${dayInfo.dayNum}${isToday?' 📍':''}</div>`;
      
      if(dayInfo.inMonth && events.length > 0){
        events.slice(0,3).forEach(ev=>{
          const info = getEventTypeInfo(ev.type);
          const gLabel = formatGrades(ev.grades);
          const gPrefix = (ev.grades && ev.grades.length > 0 && ev.grades.length < 3) ? `[${ev.grades.join('')}] ` : '';
          h += `<div style="background:${info.bg};color:${info.color};padding:2px 4px;border-radius:4px;margin-bottom:2px;font-size:10px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${ev.title} (${gLabel})${ev.affectsClasses?' · 수업영향':''}${ev.affectsNight?' · 야자영향':''}">${info.emoji}${gPrefix}${ev.title}</div>`;
        });
        if(events.length > 3){
          h += `<div style="font-size:9px;color:#86868b;text-align:center">+${events.length-3}</div>`;
        }
      }
      h += '</div>';
    });
    h += '</div>';
  });
  h += '</div>';
  
  // 이벤트 추가/편집 모달
  if(EVENT_ADD_DATE){
    h += renderEventEditor(EVENT_ADD_DATE);
  }
  
  return h;
}

function changeEventMonth(delta){
  const cur = EVENT_MONTH || (()=>{
    const n = new Date();
    return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;
  })();
  const [y,m] = cur.split('-').map(Number);
  const d = new Date(y, m-1+delta, 1);
  EVENT_MONTH = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  render();
}

// 이벤트 편집 모달 (카드 형태)
function renderEventEditor(date){
  let h = '';
  const existing = getEventsForDate(date);
  const [y,m,d] = date.split('-');
  const dObj = new Date(parseInt(y),parseInt(m)-1,parseInt(d));
  const dow = ['일','월','화','수','목','금','토'][dObj.getDay()];
  
  h += '<div class="card" style="border:2px solid #6a1b9a;background:#faf5ff;margin-top:10px">';
  h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
  h += `<div style="font-size:14px;font-weight:700;color:#4a148c">📅 ${parseInt(m)}/${parseInt(d)} (${dow}) 일정</div>`;
  h += `<button class="btn btn-sm btn-outline" onclick="EVENT_ADD_DATE=null;EVENT_EDIT=null;render()">닫기</button>`;
  h += '</div>';
  
  // 기존 이벤트 목록
  if(existing.length > 0){
    h += '<div style="margin-bottom:10px">';
    h += '<div style="font-size:11px;color:#86868b;margin-bottom:4px">등록된 일정</div>';
    existing.forEach(ev=>{
      const info = getEventTypeInfo(ev.type);
      h += `<div style="background:${info.bg};border-left:3px solid ${info.color};padding:8px 10px;border-radius:6px;margin-bottom:4px">`;
      h += `<div style="display:flex;justify-content:space-between;align-items:start;gap:6px">`;
      h += `<div style="flex:1">`;
      h += `<div style="font-size:13px;font-weight:700;color:${info.color}">${info.emoji} ${ev.title}</div>`;
      const tags = [];
      // 학년 뱃지
      const gradeLabel = formatGrades(ev.grades);
      tags.push(`<span style="background:#e8eaf6;color:#1a237e;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700">${gradeLabel}</span>`);
      if(ev.affectsClasses) tags.push('<span style="background:#ffebee;color:#c62828;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700">수업 영향</span>');
      if(ev.affectsNight) tags.push('<span style="background:#e3f2fd;color:#1565c0;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700">야자 영향</span>');
      if(tags.length > 0) h += `<div style="margin-top:4px">${tags.join(' ')}</div>`;
      if(ev.note) h += `<div style="font-size:11px;color:#424245;margin-top:4px">${ev.note}</div>`;
      h += `<div style="font-size:9px;color:#86868b;margin-top:4px">${ev.createdBy||''}</div>`;
      h += `</div>`;
      if(canManageEvents()){
        h += `<div style="display:flex;flex-direction:column;gap:3px">`;
        h += `<button class="btn btn-sm btn-outline" style="font-size:10px;padding:2px 8px;color:#1565c0;border-color:#90caf9" onclick="startEventEdit('${date}','${ev.id}')">편집</button>`;
        h += `<button class="btn btn-sm btn-outline" style="font-size:10px;padding:2px 8px;color:#c62828;border-color:#ef5350" onclick="deleteSchoolEvent('${date}','${ev.id}')">삭제</button>`;
        h += `</div>`;
      }
      h += `</div>`;
      h += `</div>`;
    });
    h += '</div>';
  }
  
  // 추가/편집 폼 (권한 있을 때)
  if(canManageEvents()){
    const editingEv = EVENT_EDIT && EVENT_EDIT.date === date ? existing.find(e=>e.id===EVENT_EDIT.eventId) : null;
    h += '<div style="background:#fff;padding:12px;border-radius:8px;border:1px solid #d1c4e9">';
    h += `<div style="font-size:12px;font-weight:700;color:#4a148c;margin-bottom:8px">${editingEv?'✏️ 일정 편집':'➕ 일정 추가'}</div>`;
    
    // 타입 선택
    h += '<div style="margin-bottom:8px">';
    h += '<div style="font-size:11px;color:#86868b;margin-bottom:4px">타입</div>';
    h += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:4px">';
    const selectedType = editingEv ? editingEv.type : 'memo';
    Object.entries(EVENT_TYPES).forEach(([key, info])=>{
      const active = selectedType === key;
      h += `<button type="button" class="type-opt" data-type="${key}" onclick="selectEventType('${key}')" style="padding:6px 8px;border-radius:6px;border:2px solid ${active?info.color:'#e5e5ea'};background:${active?info.bg:'#fff'};color:${info.color};font-size:11px;font-weight:${active?'700':'500'};cursor:pointer;text-align:left">${info.emoji} ${info.label}</button>`;

    h += `<input type="hidden" id="evInput_type" value="${selectedType}">`;
    h += '</div>';
    
    // 제목
    h += '<div style="margin-bottom:8px">';
    h += '<div style="font-size:11px;color:#86868b;margin-bottom:4px">제목 (필수)</div>';
    h += `<input type="text" id="evInput_title" value="${editingEv?editingEv.title.replace(/"/g,'&quot;'):''}" placeholder="예: 1학년 중간고사" class="auth-input" style="padding:8px 10px;font-size:13px;margin:0;width:100%">`;
    h += '</div>';
    
    // 영향 학년 선택
    h += '<div style="margin-bottom:8px;background:#f0f4ff;padding:8px;border-radius:6px">';
    h += '<div style="font-size:11px;color:#86868b;margin-bottom:6px">🎓 영향 학년</div>';
    const editGrades = editingEv && editingEv.grades ? editingEv.grades : [];
    const isAllGrades = editGrades.length === 0;
    h += '<div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center">';
    h += `<label style="display:flex;align-items:center;gap:3px;font-size:12px;font-weight:600;cursor:pointer;padding:4px 10px;background:${isAllGrades?'#1a237e':'#fff'};color:${isAllGrades?'#fff':'#424245'};border-radius:6px;border:1px solid #c5cae9"><input type="checkbox" id="evInput_allGrades" ${isAllGrades?'checked':''} style="margin:0">전체</label>`;
    [1,2,3].forEach(g=>{
      const checked = editGrades.includes(g);
      h += `<label style="display:flex;align-items:center;gap:3px;font-size:12px;cursor:pointer;padding:4px 10px;background:${checked&&!isAllGrades?'#3f51b5':'#fff'};color:${checked&&!isAllGrades?'#fff':'#424245'};border-radius:6px;border:1px solid #c5cae9"><input type="checkbox" id="evInput_grade_${g}" class="grade-check" ${checked?'checked':''} ${isAllGrades?'disabled':''} style="margin:0">${g}학년</label>`;

    h += '</div>';
    h += '<div style="font-size:10px;color:#86868b;margin-top:4px">💡 "전체" 체크 시 모든 학년에 영향 · 특정 학년만 영향 주려면 "전체" 해제 후 선택</div>';

    h += '<div style="margin-bottom:8px;background:#f5f5f7;padding:8px;border-radius:6px">';
    h += '<div style="font-size:11px;color:#86868b;margin-bottom:6px">🔗 연동 설정</div>';
    const affCls = editingEv ? editingEv.affectsClasses : false;
    const affNight = editingEv ? editingEv.affectsNight : false;
    h += `<label style="display:block;font-size:12px;margin-bottom:4px;cursor:pointer">`;
    h += `<input type="checkbox" id="evInput_affCls" ${affCls?'checked':''}> 📚 <b>수업 영향</b> (시간표에서 해당 날짜를 회색/취소 처리)`;
    h += `</label>`;
    h += `<label style="display:block;font-size:12px;cursor:pointer">`;
    h += `<input type="checkbox" id="evInput_affNight" ${affNight?'checked':''}> 🌙 <b>야자 영향</b> (야자 감독/출석이 해당 날짜에 표시되지 않음)`;
    h += `</label>`;
    h += '</div>';
    
    // 메모
    h += '<div style="margin-bottom:10px">';
    h += '<div style="font-size:11px;color:#86868b;margin-bottom:4px">메모 (선택)</div>';
    h += `<textarea id="evInput_note" placeholder="부가 설명" style="width:100%;min-height:50px;padding:8px;font-size:12px;border:1px solid #e5e5ea;border-radius:6px;resize:vertical;font-family:inherit">${editingEv?editingEv.note||'':''}</textarea>`;
    h += '</div>';
    
    // 저장/취소 버튼
    h += '<div style="display:flex;gap:6px">';
    const idArg = editingEv ? `'${editingEv.id}'` : 'null';
    h += `<button class="btn btn-sm" style="flex:1;background:#6a1b9a;color:#fff;font-weight:700" onclick="saveEventFromForm('${date}',${idArg})">💾 ${editingEv?'저장':'추가'}</button>`;
    if(editingEv){
      h += `<button class="btn btn-sm btn-outline" onclick="EVENT_EDIT=null;render()">편집 취소</button>`;
    }
    h += '</div>';
    h += '</div>';
  }
  
  h += '</div>';
  return h;
}

function selectEventType(type){
  const el = document.getElementById('evInput_type');
  if(el) el.value = type;
  // 기본 영향 자동 세팅
  const info = getEventTypeInfo(type);
  const ec = document.getElementById('evInput_affCls');
  const en = document.getElementById('evInput_affNight');
  if(ec) ec.checked = info.defAff.cls;
  if(en) en.checked = info.defAff.night;
  // UI 업데이트 (버튼 강조)
  document.querySelectorAll('.type-opt').forEach(btn=>{
    const k = btn.dataset.type;
    const kInfo = getEventTypeInfo(k);
    const active = k === type;
    btn.style.border = `2px solid ${active?kInfo.color:'#e5e5ea'}`;
    btn.style.background = active ? kInfo.bg : '#fff';
    btn.style.fontWeight = active ? '700' : '500';
  });
}

function toggleAllGradesCheckbox(){
  const all = document.getElementById('evInput_allGrades');
  if(!all) return;
  const isAll = all.checked;
  document.querySelectorAll('.grade-check').forEach(cb=>{
    cb.disabled = isAll;
    if(isAll) cb.checked = false;
  });

function startEventEdit(date, eventId){
  EVENT_EDIT = {date, eventId};
  EVENT_ADD_DATE = date;
  render();

async function saveEventFromForm(date, eventId){
  const type = document.getElementById('evInput_type').value;
  const title = document.getElementById('evInput_title').value.trim();
  const note = document.getElementById('evInput_note').value.trim();
  const affCls = document.getElementById('evInput_affCls').checked;
  const affNight = document.getElementById('evInput_affNight').checked;
  // 학년 수집
  const isAll = document.getElementById('evInput_allGrades').checked;
  const grades = [];
  if(!isAll){
    [1,2,3].forEach(g=>{
      const cb = document.getElementById(`evInput_grade_${g}`);
      if(cb && cb.checked) grades.push(g);
    });
    if(grades.length === 0){
      alert("영향 학년을 선택하세요 (전체 또는 1/2/3학년 중 하나 이상)");
      return;
    }
  }
  if(!title){alert("제목을 입력하세요");return}
  const data = {
    type,
    title,
    note,
    affectsClasses: affCls,
    affectsNight: affNight,
    grades  // 빈 배열 = 전체 학년
  };
  const id = await saveSchoolEvent(date, eventId, data);
  if(id){
    EVENT_EDIT = null;
    // 추가 후에는 폼 초기화를 위해 EVENT_ADD_DATE를 유지하되 입력 값 초기화
    if(!eventId){
      setTimeout(()=>{
        const t = document.getElementById('evInput_title');
        const n = document.getElementById('evInput_note');
        if(t) t.value = '';
        if(n) n.value = '';
      }, 100);
    }
  }
}

  h += `<div class="card-title">📅 ${grade}학년 ${parseInt(nm)}월 감독표</div>`;
  let permHint;
  if(NIGHT_BULK_MODE){
    if(NIGHT_STAMP) permHint = `🖋️ 스탬프: <b>${NIGHT_STAMP}</b> · 칸 클릭하면 바로 배정`;
    else if(NIGHT_STAMP_MODE === "erase") permHint = '🗑️ 지우기 모드 · 칸 클릭하면 해제';
    else permHint = '⚙️ 일괄 모드: 교사를 먼저 선택하면 달력 클릭으로 바로 배정';
  }
  else if(isNightAdmin()) permHint = '🗝️ 칸 클릭 = 배정/변경';
  else permHint = '📍 본인 담당일만 클릭 가능';
  h += `<div class="help-text">${permHint} · 📍 오늘 · ⭐ 내 담당${NIGHT_BULK_MODE?" · 🟡 미저장":""}</div>`;
  
  // 요일 헤더
  h += '<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-bottom:4px">';
  ['월','화','수','목','금'].forEach(d=>{
    h += `<div style="text-align:center;font-size:11px;font-weight:700;color:#86868b;padding:4px">${d}</div>`;
  });
  h += '</div>';
  
  // 각 주
  weeks.forEach(week=>{
    h += '<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-bottom:3px">';
    week.forEach(dayInfo=>{
      const isToday = dayInfo.date === today;
      const isPast = dayInfo.date < today;
      
      let bg = dayInfo.inMonth ? '#fff' : '#f5f5f7';
      let border = '#e5e5ea';
      let opacity = dayInfo.inMonth ? 1 : 0.3;
      if(isToday) border = '#1565c0';
      
      h += `<div style="background:${bg};border:2px solid ${border};border-radius:8px;padding:6px 4px;min-height:85px;opacity:${opacity};font-size:11px">`;
      h += `<div style="font-size:11px;font-weight:700;color:${isToday?'#1565c0':'#424245'};margin-bottom:4px">${dayInfo.dayNum}${isToday?' 📍':''}</div>`;
      
      if(dayInfo.inMonth){
        // 학사일정 이벤트 표시 (이 학년에 영향 주는 야자 이벤트)
        const nightEventsForDay = getNightAffectingEvents(dayInfo.date, grade);
        const isBlocked = nightEventsForDay.length > 0;
        if(isBlocked){
          const ev0 = nightEventsForDay[0];
          const eInfo = getEventTypeInfo(ev0.type);
          h += `<div style="background:${eInfo.bg};color:${eInfo.color};padding:3px 5px;border-radius:4px;margin-bottom:3px;font-size:9px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border:1px solid ${eInfo.color}" title="${ev0.title} (${formatGrades(ev0.grades)}) - 야자 없음">🚫 ${eInfo.emoji}${ev0.title}</div>`;
        }
        if(isBlocked){
          h += `<div style="text-align:center;padding:12px 4px;font-size:11px;color:#86868b;background:#fafafa;border-radius:4px;margin:2px 0">야자 없음</div>`;
          h += '</div>';
          return;
        }
        [0,1].forEach(slot=>{
          const info = getNightSupervisor(dayInfo.date, grade, slot);
          const isMine = myName && info.teacher === myName;
          const canClick = isNightAdmin() || isMine;
          let bgSlot = !info.assigned ? '#fafafa' : (isMine ? '#fff8e1' : '#f0f4ff');
          let fgSlot = !info.assigned ? '#c62828' : (isPast ? '#9e9e9e' : '#1a237e');
          if(info.pending){
            bgSlot = '#fff3e0';
            fgSlot = '#e65100';
          }
          const label = info.teacher || (canClick ? '+ 배정' : '미배정');
          const clickAction = canClick ? `setNightSwapTarget('${dayInfo.date}',${grade},${slot})` : '';
          const borderStyle = info.pending ? 'border:1.5px solid #ff9800;' : (!info.assigned?'border:1px dashed #ccc;':'');
          const prefix = info.pending ? '🟡' : (isMine?'⭐':'');
          h += `<div onclick="${clickAction}" style="background:${bgSlot};padding:3px 5px;border-radius:4px;margin-bottom:2px;font-size:10px;color:${fgSlot};font-weight:${isMine||info.pending?'700':'400'};cursor:${canClick?'pointer':'default'};line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;${borderStyle}" title="${dayInfo.month}/${dayInfo.dayNum} 감독${slot+1}: ${label}${info.pending?' (미저장)':''}">${prefix}${label}</div>`;
        });
      }
      h += '</div>';
    });
    h += '</div>';
  });
  h += '</div>';
  
  // 배정/편집 섹션
  if(NIGHT_SWAP_TARGET){
    const T_info = NIGHT_SWAP_TARGET;
    const current = getNightSupervisor(T_info.date, T_info.grade, T_info.slot);
    const isMyShift = myName && current.teacher === myName;
    const canEdit = isNightAdmin() || isMyShift;
    
    const [dy,dm,dd] = T_info.date.split('-');
    const dateObj = new Date(parseInt(dy),parseInt(dm)-1,parseInt(dd));
    const dowLabels = ['일','월','화','수','목','금','토'];
    const dow = dowLabels[dateObj.getDay()];
    
    h += '<div class="card" style="border:2px solid #1a237e;background:#f0f4ff;margin-top:10px">';
    h += `<div class="card-title" style="color:#1a237e">📝 ${parseInt(dm)}/${parseInt(dd)} (${dow}) ${T_info.grade}학년 감독${T_info.slot+1}</div>`;
    
    if(!canEdit){
      h += '<div style="background:#e3f2fd;color:#0d47a1;padding:10px 12px;border-radius:8px;margin-bottom:8px;font-size:12px">📖 <b>조회 모드</b> · 감독 배정 편집은 야자 관리자나 본인 담당일에만 가능합니다.<br>출석부는 아래에서 체크하실 수 있습니다.</div>';
      h += '<div style="text-align:right"><button class="btn btn-sm btn-outline" onclick="cancelNightSwap()">닫기</button></div>';
    } else {
      // 현재 감독자
      h += '<div style="background:#fff;padding:8px 12px;border-radius:8px;margin-bottom:8px;font-size:12px">';
      h += `<b>현재:</b> ${current.teacher || '<span style="color:#c62828">미배정</span>'}`;
      h += '</div>';
      
      // 입력
      h += `<input type="text" id="nswap_teacher" placeholder="감독 교사 이름 (빈칸 = 해제)" class="auth-input" style="padding:8px 10px;font-size:13px;margin-bottom:6px">`;
      
      // 교사 pill
      const eligible = getNightEligibleTeachers(T_info.grade);
      h += `<div style="font-size:10px;color:#86868b;margin-bottom:4px">💡 ${T_info.grade}학년 담임 + ${T_info.grade}학년 학년부장만 표시됩니다 (${eligible.length}명)</div>`;
      h += '<div style="display:flex;flex-wrap:wrap;gap:3px;max-height:200px;overflow-y:auto;margin-bottom:8px;background:#fff;padding:6px;border-radius:6px">';
      if(eligible.length === 0){
        h += '<div style="font-size:11px;color:#c62828;padding:6px">⚠️ 등록된 담임/학년부장이 없습니다. 관리자가 사용자들의 담임/학년부장 설정을 해주세요.</div>';
      } else {
        eligible.forEach(t=>{
          if(t.n === current.teacher) return;
          // 담임반 / 학년부장 표시
          const profile = Object.values(ALL_USERS).find(u=>u && u.teacherName === t.n);
          let role = '';
          if(profile && profile.homeroom){
            if(profile.homeroom.startsWith('head-')) role = ` (${T_info.grade}부장)`;
            else role = ` (${profile.homeroom})`;
          }
          h += `<button class="teacher-select-pill" onclick="document.getElementById('nswap_teacher').value='${t.n}'" style="font-size:11px;padding:4px 8px;min-height:26px">${t.n}<span style="font-size:9px;opacity:.7">${role}</span></button>`;
        });
      }
      h += '</div>';
      
      h += '<div style="display:flex;gap:6px;flex-wrap:wrap">';
      const saveLabel = NIGHT_BULK_MODE ? '📝 대기열 추가' : '💾 저장';
      h += `<button class="btn btn-sm" style="flex:1" onclick="(async()=>{const v=document.getElementById('nswap_teacher').value.trim();const ok=await saveNightAssignment('${T_info.date}',${T_info.grade},${T_info.slot},v);if(ok){NIGHT_SWAP_TARGET=null;render()}})()">${saveLabel}</button>`;
      if(current.assigned){
        const clearLabel = NIGHT_BULK_MODE ? '🗑️ 해제(대기)' : '🗑️ 해제';
        h += `<button class="btn btn-sm" style="background:#fff;color:#c62828;border:1px solid #ef5350" onclick="if(confirm('감독자 배정을 해제할까요?'))(async()=>{const ok=await saveNightAssignment('${T_info.date}',${T_info.grade},${T_info.slot},'');if(ok){NIGHT_SWAP_TARGET=null;render()}})()">${clearLabel}</button>`;
      }
      if(isNightAdmin()){
        h += `<button class="btn btn-sm btn-outline" onclick="copyFromPreviousWeek('${T_info.date}',${T_info.grade})" title="지난 주 같은 요일에서 복사">📋 지난주</button>`;
      }
      h += `<button class="btn btn-sm btn-outline" onclick="cancelNightSwap()">취소</button>`;
      h += '</div>';
    }
    h += '</div>';
    // 감독 편집창에 "출석부" 버튼 추가
    h += `<div style="margin-top:8px;text-align:center"><button class="btn btn-sm btn-outline" style="color:#1565c0;border-color:#90caf9" onclick="cancelNightSwap();jumpToAttendance('${T_info.date}',${T_info.grade})">📋 이 날짜 출석 탭으로</button></div>`;
  }
  
  // 일괄 편집 모드: 맨 아래 저장 바 (sticky)
  if(NIGHT_BULK_MODE && isNightAdmin()){
    const pendingCountEnd = Object.keys(NIGHT_PENDING).length;
    h += '<div style="position:sticky;bottom:0;z-index:40;margin:16px -12px -12px -12px;padding:14px 12px calc(14px + env(safe-area-inset-bottom,0));background:linear-gradient(180deg,rgba(255,255,255,0.5) 0%,#fff 30%);border-top:1px solid #e5e5ea;box-shadow:0 -4px 16px rgba(0,0,0,0.08)">';
    h += '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">';
    
    if(pendingCountEnd > 0){
      h += `<button class="btn" style="flex:2;min-width:180px;background:#2e7d32;font-weight:800;font-size:15px;padding:14px;box-shadow:0 2px 8px rgba(46,125,50,0.3)" onclick="saveAllPending()">💾 모두 저장 (${pendingCountEnd}건)</button>`;
      h += `<button class="btn btn-outline" style="flex:1;min-width:120px;color:#c62828;border-color:#ef5350;font-weight:600;padding:14px" onclick="if(confirm('미저장 변경을 모두 버릴까요?'))clearNightPending()">↩️ 변경 취소</button>`;
    } else {
      h += `<button class="btn" disabled style="flex:1;min-width:180px;background:#bdbdbd;font-weight:700;font-size:14px;padding:14px;cursor:not-allowed">💾 저장할 내용 없음</button>`;
    }
    h += '</div>';
    h += '</div>';
  }
  
  // 야자 관리자 배정 (시스템 관리자만)
  if(isAdmin()){
    h += '<div class="card" style="margin-top:10px">';
    h += '<div class="card-title">🗝️ 야자 관리자 배정</div>';
    h += '<div class="help-text">👑 시스템 관리자 전용 · 야자 관리자는 모든 날짜의 감독자를 배정·변경할 수 있습니다</div>';
    const nightAdmins = Object.entries(ALL_USERS).filter(([uid,p]) => p && p.isNightAdmin);
    if(nightAdmins.length > 0){
      h += '<div style="margin-bottom:8px">';
      h += '<div style="font-size:11px;font-weight:700;color:#86868b;margin-bottom:4px">현재 야자 관리자</div>';
      nightAdmins.forEach(([uid,p])=>{
        const label = p.teacherName || p.email;
        h += `<div style="display:inline-flex;align-items:center;gap:4px;background:#fff8e1;padding:4px 10px;border-radius:10px;margin-right:4px;margin-bottom:4px;font-size:12px">🗝️ ${label} <button onclick="toggleNightAdminFor('${uid}',false)" style="background:transparent;border:none;color:#c62828;cursor:pointer;font-size:12px;padding:0 2px">✕</button></div>`;
      });
      h += '</div>';
    }
    h += '<div style="font-size:11px;font-weight:700;color:#86868b;margin-bottom:4px">승인된 사용자 목록에서 추가</div>';
    h += '<div style="display:flex;flex-wrap:wrap;gap:3px;max-height:180px;overflow-y:auto">';
    Object.entries(ALL_USERS).forEach(([uid,p])=>{
      if(!p || p.isNightAdmin) return;
      if(p.status !== "approved" && !ADMIN_EMAILS.includes(p.email)) return;
      const label = p.teacherName || p.email;
      h += `<button class="teacher-select-pill" onclick="toggleNightAdminFor('${uid}',true)" style="font-size:11px">${label}</button>`;
    });
    h += '</div>';
    h += '</div>';
  }
  
  return h;
}

async function toggleNightAdminFor(uid, value){
  if(!isAdmin()){alert("시스템 관리자 권한 필요");return}
  try{
    const existing = ALL_USERS[uid] || {};
    const updated = {...existing};
    if(value) updated.isNightAdmin = true;
    else delete updated.isNightAdmin;
    await window.fb.set(`users/${uid}`, updated);
  }catch(e){alert("변경 실패: "+e.message)}
}

    h += '<div style="background:#fff8e1;color:#5d4037;padding:8px 10px;border-radius:8px;font-size:11px;margin-bottom:10px;line-height:1.5">💡 가입 시 <b>실명</b>을 정확히 입력해주세요. 관리자가 승인 시 참고하는 정보입니다.</div>';
    h += '<input type="text" id="authRealName" class="auth-input" placeholder="실명 (예: 박효덕)" autocomplete="name">';
    h += '<input type="email" id="authEmail" class="auth-input" placeholder="이메일" autocomplete="email" inputmode="email">';
    h += '<input type="password" id="authPassword" class="auth-input" placeholder="비밀번호 (6자 이상)" autocomplete="new-password">';
    h += '<input type="password" id="authPassword2" class="auth-input" placeholder="비밀번호 확인" autocomplete="new-password">';
    h += '<button class="auth-btn" onclick="submitSignUp()">가입하기</button>';
    h += '<div class="auth-switch">이미 가입하셨나요? <a onclick="AUTH_MODE=\'signin\';AUTH_ERROR=\'\';render()">로그인</a></div>';
  } else if(AUTH_MODE === "reset"){
    h += '<div style="font-size:12px;color:#86868b;margin-bottom:10px">가입한 이메일로 재설정 메일을 보내드립니다</div>';
    h += '<input type="email" id="authEmail" class="auth-input" placeholder="이메일" autocomplete="email" inputmode="email">';
    h += '<button class="auth-btn" onclick="submitReset()">재설정 메일 보내기</button>';
    h += '<div class="auth-switch"><a onclick="AUTH_MODE=\'signin\';AUTH_ERROR=\'\';render()">로그인으로 돌아가기</a></div>';
  }
  h += '</div></div>';
  app.innerHTML = h;
  
  // Auto-focus first empty input
  setTimeout(()=>{
    const e=document.getElementById('authEmail');
    if(e && !e.value) e.focus();
    else {
      const p=document.getElementById('authPassword');
