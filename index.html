<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>통영고 교무 도우미</title>
<meta name="theme-color" content="#1a237e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="교무도우미">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="manifest" href='data:application/json;charset=utf-8,{"name":"통영고 교무 도우미","short_name":"교무도우미","start_url":".","display":"standalone","background_color":"%23f5f5f7","theme_color":"%231a237e","icons":[{"src":"data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22192%22 height=%22192%22 viewBox=%220 0 192 192%22%3E%3Crect width=%22192%22 height=%22192%22 fill=%22%231a237e%22 rx=%2232%22/%3E%3Ctext x=%2296%22 y=%22120%22 font-size=%22100%22 text-anchor=%22middle%22 fill=%22white%22 font-family=%22sans-serif%22 font-weight=%22bold%22%3E통%3C/text%3E%3C/svg%3E","sizes":"192x192","type":"image/svg+xml"},{"src":"data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22512%22 height=%22512%22 viewBox=%220 0 512 512%22%3E%3Crect width=%22512%22 height=%22512%22 fill=%22%231a237e%22 rx=%2286%22/%3E%3Ctext x=%22256%22 y=%22320%22 font-size=%22260%22 text-anchor=%22middle%22 fill=%22white%22 font-family=%22sans-serif%22 font-weight=%22bold%22%3E통%3C/text%3E%3C/svg%3E","sizes":"512x512","type":"image/svg+xml"}]}'>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{font-family:-apple-system,BlinkMacSystemFont,'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f5f5f7;color:#1d1d1f;font-size:14px;line-height:1.4}

/* App Shell */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:560px;margin:0 auto;background:#f5f5f7;position:relative}
/* Bulk edit mode: widen layout on PC */
body.bulk-mode .app{max-width:1100px}
body.bulk-mode .bottom-nav{max-width:1100px}
body.bulk-mode .sheet{max-width:1100px}
@media (max-width: 768px){
  body.bulk-mode .app{max-width:100%}
}

/* Top Bar */
.topbar{background:#fff;padding:env(safe-area-inset-top,12px) 16px 10px;border-bottom:1px solid #e5e5ea;position:sticky;top:0;z-index:100;flex-shrink:0}
.topbar-content{display:flex;align-items:center;justify-content:space-between;min-height:36px}
.topbar-title{font-size:17px;font-weight:700;color:#1a237e;letter-spacing:-.3px}
.topbar-sub{font-size:11px;color:#86868b;margin-top:1px}
.topbar-btn{width:36px;height:36px;border:none;background:transparent;cursor:pointer;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;transition:background .15s}
.topbar-btn:active{background:#e5e5ea}

/* Tab Header (scrollable, replaces vertical header sections) */
.tab-header{background:#fff;border-bottom:1px solid #e5e5ea;padding:8px 12px 10px;flex-shrink:0}
.tab-header h2{font-size:20px;font-weight:700;color:#1d1d1f;letter-spacing:-.4px}
.tab-header-sub{font-size:12px;color:#86868b;margin-top:2px}

/* Content Area */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px 90px;scroll-behavior:smooth}

/* Bottom Tab Bar */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:560px;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(0,0,0,.08);padding:6px 0 calc(6px + env(safe-area-inset-bottom,0));z-index:50;display:flex;justify-content:space-around}
.nav-item{flex:1;background:none;border:none;padding:6px 4px;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:3px;color:#86868b;font-size:9px;font-weight:500;min-height:48px;justify-content:center;transition:color .15s}
.nav-item .icon{font-size:20px;line-height:1}
.nav-item.active{color:#1a237e;font-weight:700}
.nav-item:active{opacity:.6}
.nav-item .label{letter-spacing:-.2px}

/* More menu overlay */
.more-menu{position:fixed;bottom:calc(60px + env(safe-area-inset-bottom,0));right:10px;background:#fff;border-radius:14px;box-shadow:0 10px 40px rgba(0,0,0,.15),0 2px 8px rgba(0,0,0,.08);z-index:60;overflow:hidden;width:200px;animation:popUp .2s;display:none}
.more-menu.open{display:block}
.more-menu button{width:100%;padding:14px 16px;border:none;background:none;cursor:pointer;text-align:left;font-family:inherit;font-size:14px;display:flex;align-items:center;gap:10px;color:#1d1d1f;border-bottom:1px solid #f0f0f0}
.more-menu button:last-child{border-bottom:none}
.more-menu button:active{background:#f0f0f0}
.more-menu button.active{color:#1a237e;font-weight:600;background:#f0f4ff}
.more-menu .icon{font-size:18px}
@keyframes popUp{from{opacity:0;transform:translateY(10px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}

/* Cards */
.card{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card-title{font-size:13px;font-weight:700;color:#1d1d1f;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.card-sub{font-size:11px;color:#86868b;margin-bottom:8px}

/* Inputs */
.search-input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid #e5e5ea;font-size:15px;font-family:inherit;background:#f5f5f7;color:#1d1d1f}
.search-input:focus{outline:none;border-color:#1a237e;background:#fff}

/* Teacher pills (horizontal scroll) */
.pill-scroll{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:4px 0;margin:0 -12px;padding-left:12px;padding-right:12px;scrollbar-width:none}
.pill-scroll::-webkit-scrollbar{display:none}
.pill-wrap{display:flex;flex-wrap:wrap;gap:6px;padding:4px 0}
.pill{padding:8px 14px;border-radius:18px;border:1px solid #e5e5ea;background:#fff;cursor:pointer;font-size:13px;font-family:inherit;color:#1d1d1f;white-space:nowrap;font-weight:500;transition:all .15s;min-height:34px;display:inline-flex;align-items:center;gap:4px}
.pill:active{transform:scale(.95)}
.pill.active{background:#1a237e;color:#fff;border-color:#1a237e;font-weight:700}
.pill.multi-active{background:#2e7d32;color:#fff;border-color:#2e7d32;font-weight:700}
.pill .tag{font-size:10px;color:#86868b;margin-left:2px}
.pill.active .tag{color:rgba(255,255,255,.8)}

/* Dept filter (single row with horizontal scroll) */
.dept-row{display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:4px 0 6px;margin:0 -12px 8px;padding-left:12px;padding-right:12px;scrollbar-width:none}
.dept-row::-webkit-scrollbar{display:none}
.dept-chip{padding:6px 12px;border-radius:14px;border:1px solid #e5e5ea;background:#fff;cursor:pointer;font-size:12px;font-family:inherit;color:#1d1d1f;white-space:nowrap;font-weight:500;flex-shrink:0;min-height:30px;display:inline-flex;align-items:center;gap:3px}
.dept-chip.active{background:#1a237e;color:#fff;border-color:#1a237e;font-weight:700}
.dept-chip .cnt{font-size:10px;opacity:.7}

/* Schedule table (optimized for touch) */
.tt-wrap{margin:0 -2px;border-radius:10px;overflow:hidden}
table.tt{border-collapse:separate;border-spacing:2px;width:100%;table-layout:fixed;font-size:11px;background:transparent}
.tt th{background:#1a237e;color:#fff;padding:6px 2px;font-weight:700;font-size:11px;border-radius:6px}
.tt th:first-child{width:28px;font-size:10px}
.tt td{padding:4px 2px;text-align:center;vertical-align:middle;border-radius:6px;background:#fff;transition:all .15s;min-height:44px;height:44px;position:relative}
.tt td.busy{cursor:pointer}
.tt td.busy:active{transform:scale(.96)}
.tt td.sel{background:#1a237e!important;color:#fff!important;box-shadow:0 2px 8px rgba(26,35,126,.4)}
.tt td.sel .sn,.tt td.sel .rm{color:#fff!important}
.tt td.mark{background:#f5f5f7}
.tt td.empty{background:#fafafa}
.tt .sn{font-size:10px;font-weight:700;line-height:1.15;word-break:keep-all;overflow:hidden;text-overflow:ellipsis}
.tt .rm{font-size:8px;color:#86868b;margin-top:1px;font-weight:500}
.tt td.hl-free{box-shadow:inset 0 0 0 2px #2e7d32}

/* Buttons */
.btn{padding:12px 18px;border:none;border-radius:12px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:44px;transition:all .15s;background:#1a237e;color:#fff}
.btn:active{transform:scale(.97);opacity:.9}
.btn-sec{background:#f0f0f5;color:#1d1d1f}
.btn-sm{padding:8px 12px;font-size:12px;min-height:34px}
.btn-full{width:100%}
.btn-outline{background:transparent;border:1.5px solid #e5e5ea;color:#1d1d1f}

/* Result sections */
.result-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px}
.badge{display:inline-flex;align-items:center;background:#1a237e;color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:11px;min-width:22px;justify-content:center}
.badge.green{background:#2e7d32}
.badge.orange{background:#e65100}
.badge.red{background:#c62828}

.chip-list{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:7px 12px;border-radius:10px;background:#f0f4ff;border:1px solid #d0d9f0;font-size:12px;font-weight:500;color:#1a237e;cursor:pointer;transition:all .15s;min-height:34px;display:inline-flex;align-items:center}
.chip:active{transform:scale(.95)}
.chip.green-chip{background:#e8f5e9;border-color:#c8e6c9;color:#1b5e20}
.chip .dept-tag{background:rgba(0,0,0,.08);padding:1px 5px;border-radius:4px;font-size:10px;margin-left:4px;color:inherit;opacity:.8}

.swap-card{padding:12px 14px;border-radius:12px;background:#fff;border:1px solid #e5e5ea;margin-bottom:6px;cursor:pointer;transition:all .15s}
.swap-card:active{transform:scale(.98);background:#f5f5f7}
.swap-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.swap-name{font-weight:700;font-size:14px;color:#1d1d1f}
.swap-badge{background:#1a237e;color:#fff;font-size:11px;font-weight:600;padding:3px 8px;border-radius:8px}
.swap-detail{color:#424245;font-size:12px;line-height:1.4}
.swap-detail b{color:#1a237e}

.empty-state{text-align:center;padding:28px 16px;color:#86868b;font-size:13px}
.empty-state .emoji{font-size:40px;display:block;margin-bottom:8px;opacity:.5}

/* Selected info banner */
.selected-banner{background:linear-gradient(135deg,#1a237e 0%,#3949ab 100%);color:#fff;padding:14px 16px;border-radius:14px;margin-bottom:12px;box-shadow:0 4px 14px rgba(26,35,126,.25)}
.selected-banner .subj{font-size:16px;font-weight:700}
.selected-banner .meta{font-size:12px;opacity:.9;margin-top:4px}

/* Sheet / bottom sheet modal */
.sheet-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;display:none;animation:fadeIn .2s}
.sheet-overlay.open{display:block}
.sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:560px;background:#fff;border-radius:20px 20px 0 0;z-index:201;max-height:85vh;overflow:hidden;display:none;flex-direction:column;animation:slideSheetUp .3s}
.sheet.open{display:flex}
.sheet-handle{width:40px;height:5px;background:#d1d1d6;border-radius:3px;margin:10px auto 4px;flex-shrink:0}
.sheet-head{padding:8px 16px 12px;border-bottom:1px solid #e5e5ea;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sheet-title{font-size:17px;font-weight:700;color:#1d1d1f}
.sheet-close{background:#f0f0f5;border:none;width:30px;height:30px;border-radius:15px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:#86868b}
.sheet-body{flex:1;overflow-y:auto;padding:14px 16px;-webkit-overflow-scrolling:touch}
@keyframes slideSheetUp{from{transform:translate(-50%,100%)}to{transform:translate(-50%,0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Day/period grid for find tab */
.dp-grid{display:grid;grid-template-columns:34px repeat(5,1fr);gap:4px;margin-bottom:12px}
.dp-cell{padding:10px 4px;border-radius:8px;background:#fff;border:1px solid #e5e5ea;text-align:center;font-size:12px;font-weight:600;cursor:pointer;min-height:40px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.dp-cell.hdr{background:#1a237e;color:#fff;border-color:#1a237e;cursor:default;font-weight:700;font-size:11px}
.dp-cell.rowhdr{background:#f5f5f7;color:#424245;border-color:#e5e5ea;cursor:default;font-size:10px;padding:10px 0}
.dp-cell.active{background:#1a237e;color:#fff;border-color:#1a237e;font-weight:700}
.dp-cell:active:not(.hdr):not(.rowhdr){transform:scale(.95)}
.dp-cell.hl{background:#e8f5e9;border-color:#4caf50;color:#1b5e20}

/* Announcement box */
.announce-box{background:#fff;border:1.5px dashed #1a237e;border-radius:12px;padding:14px;margin-top:10px;white-space:pre-line;font-size:13px;line-height:1.7;font-family:ui-monospace,'SF Mono',Monaco,monospace;color:#1d1d1f;user-select:text}

/* Tag (department) */
.dept-tag{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:500;background:#f0f4ff;color:#1a237e;margin-left:4px}

/* Mode segmented control */
.segment{display:flex;background:#f0f0f5;border-radius:10px;padding:3px;margin-bottom:10px;gap:2px}
.segment button{flex:1;background:none;border:none;padding:8px 6px;cursor:pointer;font-family:inherit;font-size:12px;border-radius:8px;color:#86868b;font-weight:600;min-height:34px;transition:all .15s}
.segment button.active{background:#fff;color:#1a237e;font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.08)}

/* Stat cards */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}
.stat-card{background:#fff;border-radius:12px;padding:12px 10px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.stat-num{font-size:22px;font-weight:800;color:#1a237e;line-height:1.1}
.stat-lbl{font-size:10px;color:#86868b;margin-top:2px;font-weight:500}

/* Teacher bar row */
.tbar-row{padding:10px 12px;border-bottom:1px solid #f0f0f0;display:grid;grid-template-columns:auto 1fr;gap:8px;align-items:center;font-size:12px;cursor:pointer}
.tbar-row:active{background:#f5f5f7}
.tbar-row:last-child{border-bottom:none}
.tbar-name{font-weight:700;min-width:60px}
.tbar-bar{height:22px;background:#f0f0f5;border-radius:11px;overflow:hidden;position:relative}
.tbar-fill{height:100%;background:linear-gradient(90deg,#1a237e,#3949ab);border-radius:11px;transition:width .3s}
.tbar-label{position:absolute;top:0;left:8px;font-size:10px;font-weight:600;color:#fff;line-height:22px}
.tbar-dept{font-size:10px;color:#86868b}

/* Heatmap */
.heat-wrap{margin-bottom:12px}

.heat-cell{padding:8px 2px;text-align:center;border-radius:6px;font-size:12px;font-weight:700;min-height:44px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .1s}
.heat-cell:active{transform:scale(.95)}
.heat-cell.hdr{background:#1a237e;color:#fff;cursor:default;font-size:11px}
.heat-cell.rowhdr{background:#f5f5f7;color:#424245;cursor:default;font-size:10px}
.heat-pct{font-size:8px;font-weight:500;opacity:.8;margin-top:1px}
.heat-legend{display:flex;align-items:center;gap:4px;font-size:10px;color:#86868b;margin-bottom:10px;flex-wrap:wrap}
.legend-box{width:18px;height:14px;border-radius:3px}

/* Event selection */
.event-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:8px}
.event-btn{padding:10px 4px;border-radius:10px;border:1.5px solid #e5e5ea;background:#fff;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;color:#1d1d1f;min-height:40px;transition:all .15s}
.event-btn:active{transform:scale(.95)}
.event-btn.active{background:#e65100;color:#fff;border-color:#e65100;font-weight:700}
.period-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:8px}

/* Quick actions */
.qa-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.qa-btn{padding:7px 12px;border-radius:16px;border:1px solid #e5e5ea;background:#fff;font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;color:#1d1d1f;min-height:32px}
.qa-btn:active{background:#f0f0f5}

/* Counsel box */
.counsel-box{background:#fff8e1;border:1px solid #ffe082;border-radius:12px;padding:12px;margin-top:10px}
.counsel-box h4{font-size:13px;font-weight:700;color:#e65100;margin-bottom:8px}

.class-badge{background:linear-gradient(135deg,#1a237e 0%,#3949ab 100%);color:#fff;padding:16px;border-radius:14px;margin-bottom:12px;box-shadow:0 4px 14px rgba(26,35,126,.25)}
.class-badge h3{font-size:17px;font-weight:700}
.class-badge .sub{font-size:12px;opacity:.9;margin-top:4px}

.impact-row{display:grid;grid-template-columns:1fr auto;gap:8px;padding:10px 12px;background:#fff;border-radius:10px;margin-bottom:4px;font-size:12px;align-items:center;border:1px solid #f0f0f0}
.impact-name{font-weight:700}
.impact-dept{font-size:10px;color:#86868b;margin-left:4px}
.impact-lost{color:#c62828;font-weight:700;font-size:14px}
.impact-details{font-size:10px;color:#86868b;margin-top:3px;line-height:1.4}

.help-text{background:#fff8e1;border-left:3px solid #fbc02d;padding:8px 12px;border-radius:0 8px 8px 0;font-size:11px;color:#6d4c00;margin-bottom:10px;line-height:1.5}
.help-text b{color:#5d4037}

.notice-text{background:#e3f2fd;border-left:3px solid #1565c0;padding:8px 12px;border-radius:0 8px 8px 0;font-size:11px;color:#0d47a1;margin-bottom:10px}

/* Install prompt */
.install-prompt{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom,0));left:10px;right:10px;max-width:540px;margin:0 auto;background:#1a237e;color:#fff;padding:12px 14px;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,.2);display:none;align-items:center;gap:10px;z-index:150;animation:slideSheetUp .3s}
.install-prompt.show{display:flex}
.install-prompt button{border:none;padding:8px 14px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600}
.install-prompt .primary{background:#fff;color:#1a237e}
.install-prompt .close{background:transparent;color:#fff;opacity:.7;padding:4px 8px}

/* Auth screen */
.auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;padding:24px;background:linear-gradient(135deg,#f0f4ff 0%,#e8eaf6 100%);max-width:560px;margin:0 auto}
.auth-logo{font-size:48px;margin-bottom:16px}
.auth-title{font-size:26px;font-weight:800;color:#1a237e;letter-spacing:-.5px;margin-bottom:4px}
.auth-subtitle{font-size:13px;color:#86868b;margin-bottom:32px;text-align:center}
.auth-card{background:#fff;border-radius:20px;padding:24px;box-shadow:0 4px 20px rgba(0,0,0,.08);width:100%;max-width:380px}
.auth-input{width:100%;padding:14px 16px;border-radius:12px;border:1.5px solid #e5e5ea;font-size:15px;font-family:inherit;background:#f5f5f7;color:#1d1d1f;margin-bottom:10px;transition:all .15s}
.auth-input:focus{outline:none;border-color:#1a237e;background:#fff}
.auth-btn{width:100%;padding:14px;border:none;border-radius:12px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;background:#1a237e;color:#fff;margin-top:8px;min-height:48px;transition:all .15s}
.auth-btn:active{transform:scale(.98);opacity:.9}
.auth-btn:disabled{opacity:.5;cursor:not-allowed}
.auth-btn-secondary{background:transparent;color:#1a237e;margin-top:10px;padding:8px;font-size:13px;font-weight:600}
.auth-switch{text-align:center;font-size:12px;color:#86868b;margin-top:16px}
.auth-switch a{color:#1a237e;font-weight:700;cursor:pointer;text-decoration:underline}
.auth-error{background:#ffebee;color:#c62828;padding:10px 12px;border-radius:8px;font-size:12px;margin-bottom:10px;line-height:1.4}
.auth-success{background:#e8f5e9;color:#1b5e20;padding:10px 12px;border-radius:8px;font-size:12px;margin-bottom:10px;line-height:1.4}

/* Profile sheet */
.profile-card{background:#fff;border:1px solid #e5e5ea;border-radius:12px;padding:14px;margin-bottom:10px}

import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail, updatePassword, reauthenticateWithCredential, EmailAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDzBnbUtsGSdKqFsML9BbEA8iI3syY1MFg",

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

// Expose to window for non-module scripts
window.fb = {
  db, auth,
  ref: (path) => ref(db, path),
  push: (path, data) => push(ref(db, path), data),
  set: (path, data) => set(ref(db, path), data),

  // Auth methods

  signIn: (email, password) => signInWithEmailAndPassword(auth, email, password),
  signOut: () => signOut(auth),
  onAuthChange: (callback) => onAuthStateChanged(auth, callback),
  resetPassword: (email) => sendPasswordResetEmail(auth, email),
  currentUser: () => auth.currentUser,
  updatePassword: async (currentPassword, newPassword) => {
    const user = auth.currentUser;
    if(!user) throw new Error("로그인이 필요합니다");
    const credential = EmailAuthProvider.credential(user.email, currentPassword);
    await reauthenticateWithCredential(user, credential);
    return updatePassword(user, newPassword);
  }
};

// Dispatch ready event
window.dispatchEvent(new Event('fb-ready'));

// Helpers for date
function todayStr(){return new Date().toISOString().slice(0,10)}
function formatDate(s){const d=new Date(s);const days=["일","월","화","수","목","금","토"];return `${s} (${days[d.getDay()]})`}

// Get the Monday of the week containing the given date (YYYY-MM-DD)
function getWeekStart(dateStr){
  const d = new Date(dateStr);
  const day = d.getDay(); // 0=Sun, 1=Mon, ..., 6=Sat
  const offset = day === 0 ? -6 : 1 - day; // Shift to Monday
  d.setDate(d.getDate() + offset);
  return d.toISOString().slice(0,10);
}
// Get the Sunday of the same week
function getWeekEnd(dateStr){
  const monday = new Date(getWeekStart(dateStr));
  monday.setDate(monday.getDate() + 6);
  return monday.toISOString().slice(0,10);
}
// Format week range as "MM/DD - MM/DD"
function formatWeek(dateStr){
  const ws = getWeekStart(dateStr);
  const we = getWeekEnd(dateStr);
  const s = new Date(ws), e = new Date(we);
  return `${s.getMonth()+1}/${s.getDate()} ~ ${e.getMonth()+1}/${e.getDate()} (${ws.slice(0,4)}년)`;
}
// Convert day character (월/화/수/목/금) to an actual date within a given week
function dayCharToDate(weekStart, dayChar){
  const idx = DAYS.indexOf(dayChar); // 0=월, 4=금
  if(idx < 0) return null;
  const d = new Date(weekStart);
  d.setDate(d.getDate() + idx);
  return d.toISOString().slice(0,10);
}
// Get the date from a weekStart + day character (e.g., "4/24 (금)")
function formatDayInWeek(weekStart, dayChar, period){
  const date = dayCharToDate(weekStart, dayChar);
  if(!date) return `${dayChar}${period}`;
  const d = new Date(date);
  return `${d.getMonth()+1}/${d.getDate()}(${dayChar}) ${period}교시`;
}

// Get effective schedule for a teacher in a specific week (applies overrides)
// targetWeek: Monday YYYY-MM-DD of the week we want to view
function getEffectiveSlot(teacher, day, period, targetWeek){
  const k = day + period;
  const orig = teacher.s[k];
  if(!targetWeek || !RECORDS[targetWeek]) return {val:orig, changed:false};
  const records = Object.values(RECORDS[targetWeek]);
  for(const rec of records){
    if(rec.type === "sub"){
      // Substitute takes the class at that slot
      if(rec.substitute === teacher.n && rec.day === day && rec.period === period){
        return {val:`대강:${rec.subj}|${rec.room}`, changed:true, reason:"대강 배정"};
      }
      // Original teacher loses that slot (marked as canceled)
      if(rec.teacher === teacher.n && rec.day === day && rec.period === period){
        return {val:"취소", changed:true, reason:"대강자에게 위임"};
      }
    }
    if(rec.type === "swap"){
      // Swap types:
      //   - sameweek: both classes within this week (day1/day2 both in this week)
      //   - cross: one class in this week, one in another week
      // rec fields: week1, day1, period1, subj1, room1, teacher1
      //             week2, day2, period2, subj2, room2, teacher2
      
      // Teacher1 perspective: their original slot moves out, new slot comes in
      if(rec.teacher1 === teacher.n){
        // If rec.week1 === targetWeek and slot matches: their original class is gone (moved to week2)
        if(rec.week1 === targetWeek && rec.day1 === day && rec.period1 === period){
          return {val:"교체→", changed:true, reason:`${rec.week2} ${rec.day2}${rec.period2}로 이동`};
        }
        // If rec.week2 === targetWeek and slot matches: they now teach teacher2's original class here
        if(rec.week2 === targetWeek && rec.day2 === day && rec.period2 === period){
          return {val:`교체:${rec.subj1}|${rec.room1}`, changed:true, reason:`원래 ${rec.week1} ${rec.day1}${rec.period1} 수업`};
        }
      }
      
      // Teacher2 perspective
      if(rec.teacher2 === teacher.n){
        // teacher2's original slot (week2/day2/period2) is gone
        if(rec.week2 === targetWeek && rec.day2 === day && rec.period2 === period){
          return {val:"교체→", changed:true, reason:`${rec.week1} ${rec.day1}${rec.period1}로 이동`};
        }
        // teacher2 now teaches teacher1's original class at week1/day1/period1
        if(rec.week1 === targetWeek && rec.day1 === day && rec.period1 === period){
          return {val:`교체:${rec.subj2}|${rec.room2}`, changed:true, reason:`원래 ${rec.week2} ${rec.day2}${rec.period2} 수업`};
        }
      }
    }
  }
  return {val:orig, changed:false};
}

// Firebase integration
function setupFirebase(){
  if(!window.fb){
    setTimeout(setupFirebase, 200);
    return;
  }
  FB_READY = true;
  
  // Listen for auth state changes
  window.fb.onAuthChange(async (user) => {
    AUTH_CHECKING = false;
    if(user){
      // User is signed in, load their profile
      let profile = {};
      try {
        const snap = await window.fb.get(`users/${user.uid}`);
        profile = snap.val() || {};
        CURRENT_USER = {
          uid: user.uid,
          email: user.email,
          teacherName: profile.teacherName || null,
          homeroom: profile.homeroom || null,
          status: profile.status || null
        };
      } catch(e) {
        CURRENT_USER = {uid: user.uid, email: user.email, teacherName: null, homeroom: null, status: null};
      }
      // Check forced password reset flag
      FORCE_RESET_MODE = !!profile.forcePasswordReset;
      
      // Determine approval status
      // 1) Admin emails are auto-approved
      // 2) Existing profile has a status field
      // 3) New user (no profile) → auto-register as pending
      if(ADMIN_EMAILS.includes(user.email)){
        APPROVAL_STATUS = "approved";
        // Ensure admin's profile has approved status
        if(profile.status !== "approved"){
          try{
            await window.fb.set(`users/${user.uid}`, {
              ...profile,
              email: user.email,
              status: "approved",
              isAdmin: true,
              updatedAt: new Date().toISOString(),
              registeredAt: profile.registeredAt || new Date().toISOString()
            });
          }catch(e){console.error("관리자 상태 저장 실패:", e)}
        }
      } else if(profile.status){
        APPROVAL_STATUS = profile.status;
      } else {
        // New user - register as pending with real name
        APPROVAL_STATUS = "pending";
        try{
          const newProfile = {
            email: user.email,
            status: "pending",
            registeredAt: new Date().toISOString()
          };
          // Save real name if provided during signup
          if(PENDING_SIGNUP_NAME){
            newProfile.registeredName = PENDING_SIGNUP_NAME;
            PENDING_SIGNUP_NAME = null;
          }
          await window.fb.set(`users/${user.uid}`, newProfile);
        }catch(e){
          console.error("대기 상태 저장 실패:", e);
        }
      }
      // Listen for record changes
      window.fb.onValue("overrides", (snapshot) => {
        const data = snapshot.val() || {};
        RECORDS = data;
        // 탭이 swap/records 이면 현재 스크롤 유지
        if(TAB === "swap" || TAB === "records") renderPreservingScroll();
        else render();
      });
      // Listen for night supervision schedule (date-based)
      window.fb.onValue("nightSchedule", (snapshot) => {
        NIGHT_SCHEDULE = snapshot.val() || {};
        if(TAB === "night") renderPreservingScroll();
        else render();
      });
      // Listen for night student roster
      window.fb.onValue("nightStudents", (snapshot) => {
        NIGHT_STUDENTS = snapshot.val() || {};
        if(TAB === "night") renderPreservingScroll();
        else render();
      });
      // Listen for school events
      window.fb.onValue("schoolEvents", (snapshot) => {
        SCHOOL_EVENTS = snapshot.val() || {};
        if(TAB === "events" || TAB === "home" || TAB === "swap" || TAB === "night" || TAB === "attendance"){
          renderPreservingScroll();
        } else {
          render();
        }
      });
      // Listen for night attendance records
      window.fb.onValue("nightAttendance", (snapshot) => {
        NIGHT_ATTENDANCE = snapshot.val() || {};
        // 야자 탭 + 출석부 열림: body만 교체 (스크롤 보호)
        if(TAB === "night" && NIGHT_ATT_DATE && NIGHT_ATT_DATE.date && document.getElementById('attendance_body')){
          const el = document.getElementById('attendance_body');
          el.innerHTML = renderAttendanceSection(NIGHT_ATT_DATE.date, NIGHT_ATT_DATE.grade);
        } else {
          render();
        }
      });
      // Listen for all users (for conflict detection and admin panel)
      // If permission denied, fall back to just own profile
      window.fb.get("users").then(snap => {
        const canRead = true;
        console.log("[교무도우미] users 전체 로드 성공");
        window.fb.onValue("users", (snapshot) => {
          const data = snapshot.val() || {};
          ALL_USERS = data;
          if(CURRENT_USER && CURRENT_USER.uid && data[CURRENT_USER.uid]){
            const p = data[CURRENT_USER.uid];
            CURRENT_USER.teacherName = p.teacherName || null;
            CURRENT_USER.homeroom = p.homeroom || null;
            CURRENT_USER.status = p.status || null;
            FORCE_RESET_MODE = !!p.forcePasswordReset;
            // Update approval status (admin stays approved)
            if(ADMIN_EMAILS.includes(CURRENT_USER.email)){
              APPROVAL_STATUS = "approved";
            } else {
              APPROVAL_STATUS = p.status || "pending";
            }
          }
          render();
        });
      }).catch(err => {
        console.error("[교무도우미] users 전체 읽기 실패 - 규칙 확인 필요:", err.message);
        window._usersReadError = err.message;
        // Fallback: only subscribe to own profile
        window.fb.onValue(`users/${user.uid}`, (snap) => {
          const p = snap.val();
          if(p && CURRENT_USER){
            CURRENT_USER.teacherName = p.teacherName || null;
            CURRENT_USER.homeroom = p.homeroom || null;
            CURRENT_USER.status = p.status || null;
            FORCE_RESET_MODE = !!p.forcePasswordReset;
            if(ADMIN_EMAILS.includes(CURRENT_USER.email)){
              APPROVAL_STATUS = "approved";
            } else {
              APPROVAL_STATUS = p.status || "pending";
            }
            ALL_USERS[CURRENT_USER.uid] = p;
            render();
          }
        });
        render();
      });
    } else {
      CURRENT_USER = null;
      RECORDS = {};
      ALL_USERS = {};
      APPROVAL_STATUS = null;
      FORCE_RESET_MODE = false;
    }
    render();
  });
}

// Check if teacherName or homeroom is already used by another user
function checkProfileConflict(field, value, excludeUid){
  if(!value) return null;
  for(const [uid, profile] of Object.entries(ALL_USERS)){
    if(uid === excludeUid) continue;
    if(!profile) continue;
    if(profile[field] === value){
      return {uid, email: profile.email, teacherName: profile.teacherName};
    }
  }
  return null;
}

async function saveProfileField(field, value){
  if(!CURRENT_USER){alert("로그인이 필요합니다");return}
  const uid = CURRENT_USER.uid;
  
  // Check for conflict (only for teacherName and homeroom)
  if((field === "teacherName" || field === "homeroom") && value){
    const conflict = checkProfileConflict(field, value, uid);
    if(conflict){
      const fieldLabel = field === "teacherName" ? "이름" : "담임 반";
      alert(`⚠️ 충돌 감지\n\n이 ${fieldLabel}(${value})은(는) 이미 다른 계정(${conflict.email})이 사용 중입니다.\n\n본인이 맞다면 관리자에게 문의해주세요.\n관리자: ${ADMIN_EMAILS[0]}`);
      return false;
    }
  }
  
  try{
    const existing = ALL_USERS[uid] || {};
    const updated = {
      ...existing,
      [field]: value,
      email: CURRENT_USER.email,
      updatedAt: new Date().toISOString()
    };
    if(value === null || value === "") delete updated[field];
    await window.fb.set(`users/${uid}`, updated);
    CURRENT_USER[field] = value;
    // Also update local ALL_USERS to reflect immediately
    ALL_USERS[uid] = updated;
    render();
    return true;
  }catch(e){
    alert("저장 실패: "+e.message);
    return false;
  }
}

}

// Password change handler
async function handleChangePassword(){
  const currentPw = document.getElementById('currentPassword').value;
  const newPw = document.getElementById('newPassword').value;
  const newPw2 = document.getElementById('newPassword2').value;
  const errEl = document.getElementById('pwError');
  const okEl = document.getElementById('pwSuccess');
  errEl.style.display = "none"; okEl.style.display = "none";
  
  if(!currentPw || !newPw){errEl.textContent="모든 필드를 입력하세요";errEl.style.display="block";return}
  if(newPw.length < 6){errEl.textContent="새 비밀번호는 6자 이상이어야 합니다";errEl.style.display="block";return}
  if(newPw !== newPw2){errEl.textContent="새 비밀번호가 일치하지 않습니다";errEl.style.display="block";return}
  if(currentPw === newPw){errEl.textContent="새 비밀번호가 현재와 같습니다";errEl.style.display="block";return}
  
  const btn = document.getElementById('pwChangeBtn');
  btn.textContent = "변경 중..."; btn.disabled = true;
  try{
    await window.fb.updatePassword(currentPw, newPw);
    okEl.textContent = "✅ 비밀번호가 변경되었습니다";
    okEl.style.display = "block";
    document.getElementById('currentPassword').value = "";
    document.getElementById('newPassword').value = "";
    document.getElementById('newPassword2').value = "";
    btn.textContent = "🔒 비밀번호 변경";
    btn.disabled = false;
  }catch(e){
    const code = e.code || "";
    let msg = "비밀번호 변경 실패: ";
    if(code.includes("wrong-password") || code.includes("invalid-credential")) msg = "현재 비밀번호가 올바르지 않습니다";
    else if(code.includes("weak-password")) msg = "새 비밀번호가 너무 약합니다";
    else if(code.includes("requires-recent-login")) msg = "보안을 위해 다시 로그인 후 시도해주세요";
    else msg += e.message;
    errEl.textContent = msg;
    errEl.style.display = "block";
    btn.textContent = "🔒 비밀번호 변경";
    btn.disabled = false;
  }
}

function translateAuthError(e){
  const code = e.code || "";
  if(code.includes("email-already-in-use")) return "이미 가입된 이메일입니다";
  if(code.includes("invalid-email")) return "올바른 이메일 형식이 아닙니다";
  if(code.includes("weak-password")) return "비밀번호가 너무 약합니다 (6자 이상)";
  if(code.includes("user-not-found")) return "가입되지 않은 이메일입니다";
  if(code.includes("wrong-password")) return "비밀번호가 올바르지 않습니다";
  if(code.includes("invalid-credential")) return "이메일 또는 비밀번호가 올바르지 않습니다";
  if(code.includes("too-many-requests")) return "너무 많은 시도가 있었습니다. 잠시 후 다시 시도해주세요";
  if(code.includes("network-request-failed")) return "네트워크 오류가 발생했습니다";
  return e.message || "로그인 실패";
}

function saveRecord(record, weekStart){
  if(!FB_READY || !window.fb){
    alert("Firebase 연결 대기중입니다. 잠시 후 다시 시도해주세요.");
    return Promise.reject();
  }
  if(!CURRENT_USER){
    alert("로그인이 필요합니다");
    return Promise.reject();
  }
  const wk = weekStart || record.week || getWeekStart(todayStr());
  
  // 학사일정 체크: 수업 영향 있는 날짜는 교체/대강 불가
  // 크로스위크 교체는 week1/week2+day1/day2, 단일은 week+day
  const checkDates = [];
  if(record.day1 && (record.week1 || wk)){
    const d = dayCharToDate(record.week1 || wk, record.day1);
    if(d) checkDates.push(d);
  }
  if(record.day2 && (record.week2 || wk)){
    const d = dayCharToDate(record.week2 || wk, record.day2);
    if(d) checkDates.push(d);
  }
  if(record.day && !record.day1){
    const d = dayCharToDate(wk, record.day);
    if(d) checkDates.push(d);
  }
  for(const cd of checkDates){
    if(isClassBlocked(cd)){
      const reason = getBlockReason(cd, null, 'class');
      alert(`⚠️ ${cd} 날짜는 학사일정으로 인해 수업 교체/대강을 할 수 없습니다.\n\n사유: ${reason}\n\n학사일정 탭에서 해당 일정의 "수업 영향" 체크를 해제하면 교체 가능합니다.`);
      return Promise.reject(new Error("학사일정으로 차단됨"));
    }
  }
  return window.fb.push(`overrides/${wk}`, {
    ...record,
    storedAt: wk,
    createdAt: new Date().toISOString(),
    createdByUid: CURRENT_USER.uid,
    createdByEmail: CURRENT_USER.email,
    createdByName: CURRENT_USER.teacherName || CURRENT_USER.email
  });
}

function deleteRecord(date, id){
  if(!FB_READY || !window.fb) return Promise.reject();
  return window.fb.remove(`overrides/${date}/${id}`);
}

function copyText(elId,btnId){
  const el=document.getElementById(elId);
  if(!el)return;
  const text=el.innerText;
  const btn=document.getElementById(btnId);
  const done=()=>{if(btn){const orig=btn.innerHTML;btn.innerHTML='✓ 복사완료';btn.style.background='#2e7d32';setTimeout(()=>{btn.innerHTML=orig;btn.style.background='';},1500)}};
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(done).catch(()=>{fallback(text,done)});
  }else{fallback(text,done)}
}
function fallback(text,done){
  const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.top='-9999px';document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');done()}catch(e){alert('복사 실패')}
  document.body.removeChild(ta);
}

// 어제 야자 결석자 조회 (본인 담임반 기준)
// 어제가 주말이면 가장 가까운 평일 (예: 월요일 → 금요일)
function getYesterdayNightAbsentees(){
  if(!CURRENT_USER || !CURRENT_USER.homeroom) return null;
  const hr = CURRENT_USER.homeroom;
  if(!hr.match(/^\d-\d+$/)) return null; // 담임만 (head-N 아님)
  const grade = parseInt(hr.split('-')[0]);
  
  // 어제 날짜 (주말이면 전 평일)
  const today = new Date();
  let check = new Date(today);
  check.setDate(check.getDate() - 1);
  while(check.getDay() === 0 || check.getDay() === 6){
    check.setDate(check.getDate() - 1);
  }
  const ys = check.getFullYear();
  const ms = String(check.getMonth()+1).padStart(2,'0');
  const ds = String(check.getDate()).padStart(2,'0');
  const date = `${ys}-${ms}-${ds}`;
  
  // 해당 날짜의 출석 기록
  const dateData = NIGHT_ATTENDANCE[date] && NIGHT_ATTENDANCE[date][grade];
  if(!dateData) return {date, grade, homeroom: hr, absentees: [], notChecked: [], totalApplied: 0, checkDate: check};
  
  // 해당 주차의 명단 (본인 담임반만)
  const weekStart = getEffectiveWeekForDate(grade, date);
  if(!weekStart) return {date, grade, homeroom: hr, absentees: [], notChecked: [], totalApplied: 0, checkDate: check};
  const weekStudents = NIGHT_STUDENTS[grade] && NIGHT_STUDENTS[grade][weekStart];
  if(!weekStudents) return {date, grade, homeroom: hr, absentees: [], notChecked: [], totalApplied: 0, checkDate: check};
  
  const myClassStudents = Object.entries(weekStudents)
    .map(([id,s])=>({id,...s}))
    .filter(s => s.active !== false && s.classNum === hr);
  
  // 해당 날짜 요일
  const dow = check.getDay();
  const dayChar = ['','월','화','수','목','금'][dow];
  
  // 교시별 조회: 결석/미출석/미체크 수집
  const absentees = [];
  const notChecked = [];
  let totalApplied = 0;
  
  myClassStudents.forEach(s=>{
    const sched = normalizeStudentSchedule(s);
    const periodsForDay = sched[dayChar] || [];
    periodsForDay.forEach(p=>{
      totalApplied++;
      const periodData = dateData[p] || {};
      const rec = periodData[s.id];
      if(!rec || !rec.status){
        notChecked.push({student: s, period: p});
      } else if(rec.status === 'absent' || rec.status === 'late'){
        absentees.push({student: s, period: p, status: rec.status, note: rec.note, checkedBy: rec.checkedBy, checkedAt: rec.checkedAt});
      }
    });
  });
  
  return {date, grade, homeroom: hr, absentees, notChecked, totalApplied, checkDate: check};
}

    h += `<div style="font-size:14px;font-weight:700;color:#c62828">⚠️ ${parseInt(dm)}/${parseInt(dd)} (${dow}) 야자 결석자 · ${homeroom}</div>`;
    h += `<button class="btn btn-sm btn-outline" style="font-size:11px;color:#1565c0;border-color:#90caf9" onclick="jumpToAttendance('${date}',${absentInfo.grade})">📋 출석부로 이동</button>`;
    h += '</div>';
    
    if(totalApplied === 0){
      h += '<div style="padding:12px;background:#fff;border-radius:8px;color:#86868b;font-size:12px;text-align:center">어제 야자 신청자가 없습니다</div>';
    } else if(absentees.length === 0 && notChecked.length === 0){
      h += '<div style="padding:12px;background:#fff;border-radius:8px;color:#2e7d32;font-size:13px;text-align:center;font-weight:700">✅ 결석자 없음 (전원 출석/인정) · 총 ' + totalApplied + '건</div>';
    } else {
      // 결석자 리스트
      if(absentees.length > 0){
        h += `<div style="font-size:12px;font-weight:700;color:#c62828;margin-bottom:4px">❌ 결석 · ${absentees.length}건</div>`;
        // 학생별로 그룹화 (같은 학생이 여러 교시 결석한 경우)
        const byStudent = {};
        absentees.forEach(a=>{
          const k = a.student.id;
          if(!byStudent[k]) byStudent[k] = {student: a.student, records: []};
          byStudent[k].records.push(a);
        });
        Object.values(byStudent).forEach(({student, records})=>{
          h += '<div style="background:#fff;padding:8px 10px;border-radius:6px;margin-bottom:4px;border-left:3px solid #c62828">';
          h += `<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px">`;
          h += `<div style="font-weight:700;color:#424245;font-size:13px">${student.number}번 ${student.name}`;
          if(student.place) h += `<span style="font-size:10px;color:#86868b;font-weight:400"> · 📍 ${student.place}</span>`;
          h += `</div>`;
          const periodList = records.map(r=>{
            const emoji = r.status === 'late' ? '⏰' : '❌';
            return `${emoji}${r.period}교시`;
          }).join(' ');
          h += `<div style="font-size:11px;color:#c62828;font-weight:700">${periodList}</div>`;
          h += `</div>`;
          // 체크 정보
          const first = records[0];
          if(first.checkedBy){
            const t = new Date(first.checkedAt);
            const timeStr = `${t.getHours()}:${String(t.getMinutes()).padStart(2,'0')}`;
            h += `<div style="font-size:10px;color:#86868b;margin-top:2px">${first.checkedBy} 확인 · ${timeStr}</div>`;
          }
          h += '</div>';
        });
      }
      
      // 미체크 리스트 (경고)
      if(notChecked.length > 0){
        h += `<div style="font-size:12px;font-weight:700;color:#e65100;margin-top:8px;margin-bottom:4px">⬜ 미체크 · ${notChecked.length}건</div>`;
        const byStudentNC = {};
        notChecked.forEach(nc=>{
          const k = nc.student.id;
          if(!byStudentNC[k]) byStudentNC[k] = {student: nc.student, periods: []};
          byStudentNC[k].periods.push(nc.period);
        });
        Object.values(byStudentNC).forEach(({student, periods})=>{
          h += `<div style="background:#fff;padding:6px 10px;border-radius:6px;margin-bottom:3px;border-left:3px solid #9e9e9e;font-size:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px">`;
          h += `<span>${student.number}번 ${student.name}${student.place?` <span style="font-size:10px;color:#86868b">📍${student.place}</span>`:''}</span>`;
          h += `<span style="font-size:10px;color:#86868b">${periods.map(p=>p+'교시').join(' ')}</span>`;
          h += '</div>';
        });
      }
    }
    h += '</div>';
  } else if(CURRENT_USER && CURRENT_USER.homeroom && CURRENT_USER.homeroom.startsWith('head-')){
    h += '<div class="card" style="background:#e3f2fd">';
    h += `<div style="font-size:12px;color:#1565c0">👔 학년부장 - 본인 담임반 결석자 기능은 담임 선생님용입니다</div>`;
    h += '</div>';
  } else if(!CURRENT_USER || !CURRENT_USER.homeroom){
    h += '<div class="card" style="background:#fff3e0">';
    h += `<div style="font-size:12px;color:#e65100">💡 담임 반을 설정하면 야자 결석자 확인 기능이 표시됩니다</div>`;
    h += `<div style="font-size:10px;color:#86868b;margin-top:4px">프로필 → 담임 반 설정에서 지정</div>`;
    h += '</div>';
  }
  
  // 오늘의 학사일정 (본인 담임반 학년 + 전체 학년 이벤트)
  let myGrade = null;
  if(CURRENT_USER && CURRENT_USER.homeroom){
    const hr = CURRENT_USER.homeroom;
    if(/^\d-\d+$/.test(hr)) myGrade = parseInt(hr.split('-')[0]);
    else if(hr.startsWith('head-')) myGrade = parseInt(hr.split('-')[1]);
  }
  const todayEvents = getEventsForDate(today, myGrade);
  if(todayEvents.length > 0){
    h += '<div class="card" style="border-left:4px solid #6a1b9a">';
    const gNote = myGrade ? ` (${myGrade}학년 + 전체)` : '';
    h += `<div style="font-size:12px;font-weight:700;color:#4a148c;margin-bottom:6px">📅 오늘 학사일정${gNote} (${todayEvents.length})</div>`;
    todayEvents.forEach(ev=>{
      const eInfo = getEventTypeInfo(ev.type);
      h += `<div style="background:${eInfo.bg};color:${eInfo.color};padding:6px 10px;border-radius:6px;margin-bottom:4px;font-size:12px;font-weight:600">${eInfo.emoji} ${ev.title}`;
      const tags = [];
      if(ev.grades && ev.grades.length > 0) tags.push(formatGrades(ev.grades));
      if(ev.affectsClasses) tags.push('수업영향');
      if(ev.affectsNight) tags.push('야자영향');
      if(tags.length > 0) h += ` <span style="font-size:10px;opacity:.7">(${tags.join(', ')})</span>`;
      h += '</div>';
    });
    h += '</div>';
  }
  
  // 본인 시간표 (이번 주 교체 반영)
  if(myT){
    h += '<div class="card">';
    h += `<div class="card-title">📅 ${myT.n} 선생님 시간표 (이번 주)</div>`;
    try {
      const weekStart = getWeekStart(todayStr());
      const result = getTeacherWithOverrides(myT, weekStart);
      const effTeacher = (result && result.teacher) || myT;
      const myChanges = (result && result.changes) || {};
      h += renderTimetableWithChanges(effTeacher, null, null, myChanges);
      const changeCount = Object.keys(myChanges).length;
      if(changeCount > 0){
        h += `<div style="font-size:11px;color:#e65100;margin-top:6px;text-align:center">🔄 이번 주 ${changeCount}건 변경 있음 (주황 테두리)</div>`;
      }
    } catch(e) {
      console.error("시간표 로드 실패:", e);
      // 교체 반영 실패 시 기본 시간표 표시
      try {
        h += renderTimetableWithChanges(myT, null, null, {});
      } catch(e2) {
        h += `<div style="padding:10px;color:#c62828;font-size:12px">시간표 표시 실패: ${e2.message}</div>`;
      }
    }
    h += '</div>';
  } else {
    h += '<div class="card" style="background:#fff3e0">';
    h += `<div style="font-size:12px;color:#e65100">⚠️ 시간표를 찾을 수 없습니다. 프로필에서 이름을 확인하세요.</div>`;
    h += '</div>';
  }
  
  // 빠른 액세스
  h += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:6px;margin-top:10px">';
  h += `<button class="btn btn-outline" style="padding:12px" onclick="setTab('events')">📅 학사일정</button>`;
  h += `<button class="btn btn-outline" style="padding:12px" onclick="setTab('night')">🌙 야자 감독</button>`;
  h += `<button class="btn btn-outline" style="padding:12px" onclick="setTab('attendance')">📋 야자 출석</button>`;
  h += `<button class="btn btn-outline" style="padding:12px" onclick="setTab('swap')">🔄 수업 교체</button>`;
  h += '</div>';
  
  return h;
}

function renderSwapTab(){
  // Auto-set ME to current user's teacher on first entry (not after explicit clear)
  if(ME === null && !ME_MANUAL_CLEAR && CURRENT_USER && CURRENT_USER.teacherName){
    const myIdx = T.findIndex(t => t.n === CURRENT_USER.teacherName);
    if(myIdx >= 0) ME = myIdx;
  }
  let h='';
  // Week-based date selector
  const weekStart = getWeekStart(VIEW_DATE);
  const weekCount = (RECORDS[weekStart] && Object.keys(RECORDS[weekStart]).length) || 0;
  h+='<div class="card" style="padding:10px 12px;margin-bottom:8px">';
  h+='<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px">';
  h+=`<div style="font-size:11px;font-weight:700;color:#1a237e">📅 조회 주: <b>${formatWeek(VIEW_DATE)}</b></div>`;
  if(weekCount>0)h+=`<span style="background:#e65100;color:#fff;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700">변경 ${weekCount}건</span>`;
  h+='</div>';
  h+='<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">';
  h+=`<input type="date" value="${VIEW_DATE}" onchange="VIEW_DATE=this.value;SEL=null;render()" style="flex:1;min-width:140px;padding:6px 8px;border-radius:6px;border:1px solid #e5e5ea;font-size:12px;font-family:inherit">`;
  h+=`<button class="qa-btn" style="padding:5px 10px;font-size:11px" onclick="VIEW_DATE=todayStr();SEL=null;render()">이번주</button>`;
  h+=`<button class="qa-btn" style="padding:5px 10px;font-size:11px" onclick="const d=new Date(VIEW_DATE);d.setDate(d.getDate()-7);VIEW_DATE=d.toISOString().slice(0,10);SEL=null;render()">◀ 이전주</button>`;
  h+=`<button class="qa-btn" style="padding:5px 10px;font-size:11px" onclick="const d=new Date(VIEW_DATE);d.setDate(d.getDate()+7);VIEW_DATE=d.toISOString().slice(0,10);SEL=null;render()">다음주 ▶</button>`;
  h+='</div></div>';
  
  if(ME===null){
    h+='<div class="card"><div class="help-text">💡 <b>교체 기준이 될 선생님 선택 → 수업 칸 클릭</b></div>';
    h+=renderSearchAndTeachers('setMe',null);
    h+='</div>';
    return h;
  }
  const myT_orig=T[ME];
  const {teacher: myT, changes: myChanges} = getTeacherWithOverrides(myT_orig, weekStart);
  
  // 이번 주 학사일정 배너 (수업 영향 있는 것만)
  const weekEvents = [];
  for(let i=0;i<5;i++){
    const d = new Date(weekStart);
    d.setDate(d.getDate()+i);
    const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    getClassAffectingEvents(ds).forEach(ev=>{
      weekEvents.push({...ev, date: ds, dayChar: ['일','월','화','수','목','금','토'][d.getDay()]});
    });
  }
  if(weekEvents.length > 0){
    h += '<div class="card" style="border-left:4px solid #c62828;background:#fff8f8;margin-bottom:8px">';
    h += `<div style="font-size:12px;font-weight:700;color:#c62828;margin-bottom:6px">📅 이번 주 수업 영향 일정 (${weekEvents.length})</div>`;
    weekEvents.forEach(ev=>{
      const eInfo = getEventTypeInfo(ev.type);
      const [ey,em,ed] = ev.date.split('-');
      h += `<div style="background:${eInfo.bg};color:${eInfo.color};padding:5px 10px;border-radius:6px;margin-bottom:3px;font-size:12px;font-weight:600">${eInfo.emoji} ${parseInt(em)}/${parseInt(ed)}(${ev.dayChar}) ${ev.title}</div>`;
    });
    h += '</div>';
  }
  
  h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div><div style="font-size:15px;font-weight:700">${myT.n}${deptTag(myT)}</div><div style="font-size:11px;color:#86868b;margin-top:2px">${myT.h}시수</div></div>`;
  const isMyself = CURRENT_USER && CURRENT_USER.teacherName === myT.n;
  h+=`<button class="btn btn-sec btn-sm" onclick="ME=null;SEL=null;ME_MANUAL_CLEAR=true;render()">${isMyself?'다른 교사':'변경'}</button></div>`;
  h+=renderTimetableWithChanges(myT,'setSel',SEL,myChanges);
  h+='</div>';

  if(SEL){
    const selCell=pc(myT.s[SEL]);
    if(selCell){
      const day=SEL[0],per=SEL.slice(1);
      const subs=[],swaps=[];
      // Use effective (overridden) schedules for accurate sub/swap matching (this week)
      T.forEach((t,i)=>{
        if(i===ME)return;
        const {teacher:tEff} = getTeacherWithOverrides(t, weekStart);
        if(gs(tEff,day,parseInt(per))==="free")subs.push({idx:i,name:t.n,dept:t.d})
      });
      const myRoom=selCell.room;
      // Same-week swaps: find teachers with same-room classes in other slots this week, and they're free at my slot
      T.forEach((t,i)=>{
        if(i===ME)return;
        const {teacher:tEff} = getTeacherWithOverrides(t, weekStart);
        if(gs(tEff,day,parseInt(per))!=="free")return;
        DAYS.forEach(d2=>{PERIODS.forEach(p2=>{
          const k2=d2+p2;const c2=pc(tEff.s[k2]);
          if(!c2||c2.room!==myRoom)return;
          if(gs(myT,d2,p2)!=="free")return;
          if(gs(tEff,d2,p2)!=="busy")return;
          swaps.push({idx:i,name:t.n,theirDay:d2,theirPer:p2,subj:c2.full,room:c2.room,crossWeek:false,theirWeek:weekStart});
        })});
      });
      h+=`<div class="selected-banner"><div class="subj">${selCell.full}</div><div class="meta">${day}요일 ${per}교시 · ${selCell.room}교실</div></div>`;
      h+='<div class="card">';
      h+=`<div class="result-head"><div class="card-title" style="margin:0;color:#2e7d32">✅ 대강 가능</div><span class="badge green">${subs.length}</span></div>`;
      h+='<div class="card-sub">이 시간에 공강인 교사 · 🎯 동교과 우선</div>';
      if(subs.length===0)h+='<div class="empty-state"><span class="emoji">😔</span>공강인 교사가 없습니다</div>';
      else{
        // Group subs by department: same dept first, then others by dept name
        const myDept=myT.d;
        const grouped={};
        subs.forEach(s=>{if(!grouped[s.dept])grouped[s.dept]=[];grouped[s.dept].push(s)});
        // Sort dept names: my dept first, then others alphabetically
        const deptOrder=Object.keys(grouped).sort((a,b)=>{
          if(a===myDept)return -1;
          if(b===myDept)return 1;
          return a.localeCompare(b);
        });
        deptOrder.forEach(dept=>{
          const isSame=dept===myDept;
          h+=`<div style="margin-bottom:8px"><div style="font-size:11px;font-weight:700;color:${isSame?"#c62828":"#86868b"};margin-bottom:4px;display:flex;align-items:center;gap:4px">${isSame?"🎯 ":""}${dept} <span style="font-weight:400;opacity:.7">(${grouped[dept].length}명)</span>${isSame?' <span style="background:#ffebee;color:#c62828;font-size:9px;padding:1px 5px;border-radius:3px;margin-left:4px">동교과</span>':""}</div>`;
          h+='<div class="chip-list">';
          grouped[dept].sort((a,b)=>a.name.localeCompare(b.name)).forEach(s=>{
            const chipStyle=isSame?'style="background:#ffebee;border-color:#ffcdd2;color:#c62828;font-weight:700"':'';
            h+=`<button class="chip green-chip" ${chipStyle} onclick='showSubAnnouncement(${JSON.stringify({myName:myT.n,subName:s.name,day,per,subj:selCell.full,room:selCell.room}).replace(/'/g,"&#39;")})'>${s.name}</button>`;
          });
          h+='</div></div>';
        });
      }
      h+='</div>';
      h+='<div class="card">';
      h+=`<div class="result-head"><div class="card-title" style="margin:0;color:#1a237e">🔄 수업 교체</div><span class="badge">${swaps.length}</span></div>`;
      h+=`<div class="card-sub">같은 교실(${myRoom})에서 교체 가능한 수업</div>`;
      if(swaps.length===0)h+='<div class="empty-state"><span class="emoji">🔍</span>같은 주 교체 가능 수업이 없습니다</div>';
      else{swaps.forEach(s=>{h+=`<div class="swap-card" onclick='showSwapAnnouncement(${JSON.stringify({myName:myT.n,otherName:s.name,myDay:day,myPer:per,mySubj:selCell.full,myRoom:selCell.room,theirDay:s.theirDay,theirPer:s.theirPer,theirSubj:s.subj,theirRoom:s.room,myWeek:weekStart,theirWeek:weekStart}).replace(/'/g,"&#39;")})'><div class="swap-card-top"><span class="swap-name">${s.name}</span><span class="swap-badge">${s.theirDay} ${s.theirPer}교시</span></div><div class="swap-detail"><b>${s.theirDay} ${s.theirPer}교시 ${s.subj}</b>(${s.room}교실)과 교체</div></div>`})}
      h+=`<button class="btn btn-outline btn-full" style="margin-top:8px" onclick='openCrossWeekSwap(${JSON.stringify({myName:myT.n,myDay:day,myPer:per,mySubj:selCell.full,myRoom:selCell.room,myWeek:weekStart}).replace(/'/g,"&#39;")})'>🗓️ 다른 주 수업과 교체</button>`
      h+='</div>';
    }
  }
  return h;
}

function showSubAnnouncement(d){
  const myT=T.find(t=>t.n===d.myName);
  const subT=T.find(t=>t.n===d.subName);
  const msg=`[대강 요청]\n\n${d.day}요일 ${d.per}교시\n${d.myName} 선생님의 수업을 ${d.subName} 선생님이 대강해주시기 바랍니다.\n\n• 과목: ${d.subj}\n• 교실: ${d.room}교실\n\n감사합니다.`;
  
  if(!subT){
    openSheet('📢 대강 안내문',`<div class="announce-box" id="annText">${msg}</div><button class="btn btn-full" id="copyBtn" onclick="copyText('annText','copyBtn')" style="margin-top:10px">📋 안내문 복사하기</button>`);
    return;
  }
  
  // Build simulated schedule: sub teacher gets my class added to their timetable
  const subAfter=JSON.parse(JSON.stringify(subT));
  const targetKey=d.day+d.per;
  subAfter.s[targetKey]=`대강:${d.subj}|${d.room}`;
  
  // Analyze consecutive classes on that day
  function analyzeDayRun(teacher,day){
    let curRun=0,maxRun=0;
    PERIODS.forEach(p=>{
      const v=teacher.s[day+p];
      if(v&&v!=="X"){curRun++;if(curRun>maxRun)maxRun=curRun}
      else{curRun=0}
    });
    return maxRun;
  }
  
  const subBefore=analyzeDayRun(subT,d.day);
  const subAfterRun=analyzeDayRun(subAfter,d.day);
  
  // Count total classes on that day
  let subDayBefore=0,subDayAfter=0;
  PERIODS.forEach(p=>{
    if(subT.s[d.day+p]&&subT.s[d.day+p]!=="X")subDayBefore++;
    if(subAfter.s[d.day+p]&&subAfter.s[d.day+p]!=="X")subDayAfter++;
  });
  
  const warnings=[];
  if(subAfterRun>=3&&subAfterRun>subBefore){
    warnings.push(`${d.subName} 선생님: ${d.day}요일 <b>${subAfterRun}연강</b> 발생 (기존 ${subBefore||0}연강)`);
  }
  
  // Render preview table (highlight the substitute slot)
  function renderSubPreview(before,after){
    let h='<table class="tt" style="width:100%"><thead><tr><th>⏰</th>';
    DAYS.forEach(dd=>{h+=`<th>${dd}</th>`});
    h+='</tr></thead><tbody>';
    PERIODS.forEach(pr=>{
      h+=`<tr><td style="background:#f5f5f7;color:#86868b;font-weight:700;font-size:10px">${pr}</td>`;
      DAYS.forEach(dd=>{
        const k=dd+pr;
        const beforeV=before.s[k]||'';
        const afterV=after.s[k]||'';
        const changed=beforeV!==afterV;
        const s=gs(after,dd,pr);
        const c=pc(afterV);
        let cls='',style='';
        if(s==='mark')cls='mark';
        else if(s==='busy'){cls='busy';if(c)style=`background:${gc(c.subj)}`}
        else cls='empty';
        if(changed){
          style+=';box-shadow:inset 0 0 0 2.5px #e65100';
          if(s==='busy')style=`background:#fff3e0;${style}`;
        }
        h+=`<td class="${cls}" style="${style}">`;
        if(s==='mark')h+='<span style="color:#c7c7cc;font-size:9px">×</span>';
        else if(s==='busy'&&c){

function showSwapAnnouncement(d){
  const myT=T.find(t=>t.n===d.myName);
  const otherT=T.find(t=>t.n===d.otherName);
  const msg=`[수업 교체 안내]\n\n${d.myName} 선생님과 ${d.otherName} 선생님 간 수업 교체\n\n▶ ${d.myDay}요일 ${d.myPer}교시 (${d.myRoom}교실)\n  기존: ${d.myName} - ${d.mySubj}\n  변경: ${d.otherName} - ${d.theirSubj}\n\n▶ ${d.theirDay}요일 ${d.theirPer}교시 (${d.theirRoom}교실)\n  기존: ${d.otherName} - ${d.theirSubj}\n  변경: ${d.myName} - ${d.mySubj}\n\n각 반 학생들은 수업 결손 없이 정상 수업받습니다.`;
  
  if(!myT||!otherT){
    openSheet('📢 교체 안내문',`<div class="announce-box" id="annText">${msg}</div><button class="btn btn-full" id="copyBtn" onclick="copyText('annText','copyBtn')" style="margin-top:10px">📋 안내문 복사하기</button>`);
    return;
  }
  
  // Build simulated schedules after swap
  const myAfter=JSON.parse(JSON.stringify(myT));
  const otherAfter=JSON.parse(JSON.stringify(otherT));
  const myKey=d.myDay+d.myPer;
  const theirKey=d.theirDay+d.theirPer;
  myAfter.s[theirKey]=myT.s[myKey];
  delete myAfter.s[myKey];
  otherAfter.s[myKey]=otherT.s[theirKey];
  delete otherAfter.s[theirKey];
  
  // Analyze consecutive classes for a specific day
  function analyzeDayRun(teacher,day){
    let curRun=0,maxRun=0;
    PERIODS.forEach(p=>{
      const v=teacher.s[day+p];
      if(v&&v!=="X"){curRun++;if(curRun>maxRun)maxRun=curRun}
      else{curRun=0}
    });
    return maxRun;
  }
  
  // Check warnings: 3+ consecutive after swap
  const warnings=[];
  // My new workload on theirDay
  const myBefore=analyzeDayRun(myT,d.theirDay);
  const myAfterRun=analyzeDayRun(myAfter,d.theirDay);
  if(myAfterRun>=3&&myAfterRun>myBefore){
    warnings.push(`${d.myName} 선생님: ${d.theirDay}요일 <b>${myAfterRun}연강</b> 발생 (기존 ${myBefore||0}연강)`);
  }
  // Other teacher's new workload on myDay
  const otherBefore=analyzeDayRun(otherT,d.myDay);
  const otherAfterRun=analyzeDayRun(otherAfter,d.myDay);
  if(otherAfterRun>=3&&otherAfterRun>otherBefore){
    warnings.push(`${d.otherName} 선생님: ${d.myDay}요일 <b>${otherAfterRun}연강</b> 발생 (기존 ${otherBefore||0}연강)`);
  }
  
  // Render preview table showing changed cells
  function renderPreviewTable(before,after){
    let h='<table class="tt" style="width:100%"><thead><tr><th>⏰</th>';
    DAYS.forEach(dd=>{h+=`<th>${dd}</th>`});
    h+='</tr></thead><tbody>';
    PERIODS.forEach(pr=>{
      h+=`<tr><td style="background:#f5f5f7;color:#86868b;font-weight:700;font-size:10px">${pr}</td>`;
      DAYS.forEach(dd=>{
        const k=dd+pr;
        const beforeV=before.s[k]||'';
        const afterV=after.s[k]||'';
        const changed=beforeV!==afterV;
        const s=gs(after,dd,pr);
        const c=pc(afterV);
        let cls='',style='';
        if(s==='mark')cls='mark';
        else if(s==='busy'){cls='busy';if(c)style=`background:${gc(c.subj)}`}
        else cls='empty';
        if(changed){
          if(s==='busy')style+=';box-shadow:inset 0 0 0 2.5px #e65100';
          else style='background:#fff3e0;box-shadow:inset 0 0 0 2.5px #e65100';
        }
        h+=`<td class="${cls}" style="${style}">`;
        if(s==='mark')h+='<span style="color:#c7c7cc;font-size:9px">×</span>';
        else if(s==='busy'&&c){
          const icon=changed?'<span style="position:absolute;top:0px;right:2px;font-size:9px;color:#e65100;font-weight:700">➕</span>':'';
          h+=`<div style="position:relative">${icon}<div class="sn">${c.full.length>8?c.subj:c.full}</div><div class="rm">${c.room}</div></div>`;
        }
        else{
          if(changed)h+='<span style="color:#e65100;font-size:9px;font-weight:700">➖</span>';
          else h+='<span style="color:#d1d1d6;font-size:9px">·</span>';
        }
        h+='</td>';
      });
      h+='</tr>';
    });
    h+='</tbody></table>';
    return h;
  }
  
  let body='';
  
  // Warning / OK banner
  if(warnings.length>0){
    body+='<div style="background:#fff3e0;border:1.5px solid #ff9800;border-radius:10px;padding:10px 12px;margin-bottom:12px">';
    body+='<div style="font-weight:700;color:#e65100;font-size:13px;margin-bottom:6px">⚠️ 연강 주의</div>';
    warnings.forEach(w=>{body+=`<div style="font-size:12px;color:#bf360c;line-height:1.6;margin-bottom:2px">${w}</div>`});
    body+='</div>';
  }else{
    body+='<div style="background:#e8f5e9;border:1.5px solid #66bb6a;border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:#1b5e20"><b>✅ 연강 걱정 없음</b> · 교체 후에도 3연강 이상 발생하지 않아요</div>';
  }
  
  // Legend
  body+='<div style="font-size:10px;color:#86868b;margin-bottom:8px;line-height:1.5">🟠 주황 테두리 = 변경된 칸 · ➕ 추가된 수업 · ➖ 비워진 칸</div>';
  
  // My schedule preview
  body+=`<div style="margin-bottom:12px">`;
  body+=`<div style="font-size:13px;font-weight:700;color:#1a237e;margin-bottom:6px">👤 ${d.myName} 선생님 (교체 후)</div>`;
  body+=`<div class="tt-wrap">${renderPreviewTable(myT,myAfter)}</div>`;
  body+=`</div>`;
  
  // Other teacher schedule preview
  body+=`<div style="margin-bottom:14px">`;
  body+=`<div style="font-size:13px;font-weight:700;color:#1a237e;margin-bottom:6px">👤 ${d.otherName} 선생님 (교체 후)</div>`;
  body+=`<div class="tt-wrap">${renderPreviewTable(otherT,otherAfter)}</div>`;
  body+=`</div>`;
  
  // Announcement
  body+=`<div style="margin-top:14px;padding-top:14px;border-top:1px solid #e5e5ea">`;
  body+=`<div style="font-size:13px;font-weight:700;color:#1a237e;margin-bottom:6px">📢 안내문</div>`;
  body+=`<div class="announce-box" id="annText">${msg}</div>`;
  body+=`<div style="display:flex;gap:6px;margin-top:10px">`;
  body+=`<button class="btn btn-sec" id="copyBtn" onclick="copyText('annText','copyBtn')" style="flex:1">📋 복사</button>`;
  body+=`<button class="btn" id="confirmSwapBtn" onclick='confirmSwap(${JSON.stringify(d).replace(/'/g,"&#39;")})' style="flex:1.5">✅ 기록 확정</button>`;
  body+=`</div>`;
  body+=`<div style="font-size:10px;color:#86868b;margin-top:6px;text-align:center">확정 시 오늘(${todayStr()}) 기록으로 저장됩니다</div>`;
  body+=`</div>`;
  
  openSheet('🔄 교체 미리보기',body);
}

function confirmSwap(d){
  if(!FB_READY){alert("Firebase 연결 중입니다. 잠시 후 다시 시도해주세요.");return}
  // Use VIEW_DATE's week for "my" side, d.theirWeek for the other side (may differ for cross-week)
  const week1 = d.myWeek || getWeekStart(VIEW_DATE);
  const week2 = d.theirWeek || getWeekStart(VIEW_DATE);
  const record = {
    type: "swap",
    teacher1: d.myName,
    teacher2: d.otherName,
    week1, day1: d.myDay, period1: parseInt(d.myPer), subj1: d.mySubj, room1: d.myRoom,
    week2, day2: d.theirDay, period2: parseInt(d.theirPer), subj2: d.theirSubj, room2: d.theirRoom,
    crossWeek: week1 !== week2,
    createdBy: d.myName
  };
  const btn=document.getElementById('confirmSwapBtn');
  if(btn){btn.textContent="저장 중...";btn.disabled=true}
  // Save under week1; if cross-week, also save reference under week2
  const weekForStorage = week1; // Primary storage week
  saveRecord(record, weekForStorage).then((ref)=>{
    if(record.crossWeek){
      // Also write a reference in the other week
      return saveRecord({...record, crossRef: ref.key}, week2).then(()=>{
        if(btn){btn.textContent="✅ 확정됨";btn.style.background="#2e7d32"}
        setTimeout(()=>{closeSheet();setTab('records')},800);
      });
    }
    if(btn){btn.textContent="✅ 확정됨";btn.style.background="#2e7d32"}
    setTimeout(()=>{closeSheet();setTab('records')},800);
  }).catch(e=>{
    if(btn){btn.textContent="✅ 기록 확정";btn.disabled=false}
    alert("저장 실패: "+e.message);
  });
}

// Cross-week swap: user selected their slot, now pick target week + slot
let CROSS_SWAP_STATE = null;
let RECORDS_VIEW_TEACHER = null; // index of teacher to preview in records tab
function setRecordsViewTeacher(i){RECORDS_VIEW_TEACHER=i;render()}
function openCrossWeekSwap(myInfo){
  CROSS_SWAP_STATE = {myInfo, targetWeek: getWeekStart(VIEW_DATE)};
  renderCrossWeekSheet();
}
function changeCrossWeek(delta){
  const d = new Date(CROSS_SWAP_STATE.targetWeek);
  d.setDate(d.getDate() + delta*7);
  CROSS_SWAP_STATE.targetWeek = d.toISOString().slice(0,10);
  renderCrossWeekSheet();
}
function renderCrossWeekSheet(){
  const st = CROSS_SWAP_STATE;
  if(!st) return;
  const myInfo = st.myInfo;
  const targetWk = st.targetWeek;
  const myRoom = myInfo.myRoom;
  const me = T.find(t=>t.n===myInfo.myName);
  
  // Find all swappable slots for the target week:
  // - Another teacher's class in the same room (210 etc)
  // - They are free at my slot in my week
  // - I am free at their slot in the target week
  const candidates = [];
  T.forEach((t,i)=>{
    if(t.n===myInfo.myName)return;
    const {teacher:tEff} = getTeacherWithOverrides(t, targetWk);
    // They must be free in my week at my slot
    const {teacher:tInMyWeek} = getTeacherWithOverrides(t, myInfo.myWeek);
    if(gs(tInMyWeek, myInfo.myDay, parseInt(myInfo.myPer)) !== "free")return;
    // I must be free in target week at their slot
    const {teacher:meInTargetWeek} = getTeacherWithOverrides(me, targetWk);
    DAYS.forEach(d2=>{PERIODS.forEach(p2=>{
      const c2 = pc(tEff.s[d2+p2]);
      if(!c2 || c2.room !== myRoom)return;
      if(gs(tEff,d2,p2) !== "busy")return;
      if(gs(meInTargetWeek,d2,p2) !== "free")return;
      // If target week is same as my week and slot is same, skip (same-week already handled)
      if(targetWk === myInfo.myWeek && d2 === myInfo.myDay && p2 === parseInt(myInfo.myPer))return;
      candidates.push({teacher:t.n, dept:t.d, day:d2, per:p2, subj:c2.full, room:c2.room});
    })});
  });
  
  let body = '';
  body += `<div style="background:#f0f4ff;border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:#1a237e">`;
  body += `<b>내 수업:</b> ${formatWeek(myInfo.myWeek)}<br>${myInfo.myDay}요일 ${myInfo.myPer}교시 · ${myInfo.mySubj}(${myInfo.myRoom}실)`;
  body += `</div>`;
  
  // Week picker
  body += `<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">`;
  body += `<button class="btn btn-sec btn-sm" onclick="changeCrossWeek(-1)">◀ 이전주</button>`;
  body += `<div style="flex:1;text-align:center;font-size:12px;font-weight:700;color:#1a237e">교체 대상 주<br><span style="font-size:13px">${formatWeek(targetWk)}</span></div>`;
  body += `<button class="btn btn-sec btn-sm" onclick="changeCrossWeek(1)">다음주 ▶</button>`;
  body += `</div>`;
  
  if(targetWk === myInfo.myWeek){
    body += `<div style="background:#fff8e1;border-left:3px solid #fbc02d;padding:8px 12px;border-radius:0 8px 8px 0;font-size:11px;color:#6d4c00;margin-bottom:10px">같은 주예요. 다른 주를 선택하거나 뒤로 가세요.</div>`;
  }
  
  body += `<div style="font-size:13px;font-weight:700;margin-bottom:6px">🔄 교체 가능 수업 (${candidates.length}건)</div>`;
  if(candidates.length === 0){
    body += `<div class="empty-state"><span class="emoji">🔍</span>이 주에는 같은 교실(${myRoom}) 교체 가능 수업이 없습니다</div>`;
  } else {
    candidates.forEach(c=>{
      const payload = {myName:myInfo.myName,otherName:c.teacher,myDay:myInfo.myDay,myPer:myInfo.myPer,mySubj:myInfo.mySubj,myRoom:myInfo.myRoom,theirDay:c.day,theirPer:c.per,theirSubj:c.subj,theirRoom:c.room,myWeek:myInfo.myWeek,theirWeek:targetWk};
      body += `<div class="swap-card" onclick='showSwapAnnouncement(${JSON.stringify(payload).replace(/'/g,"&#39;")})'><div class="swap-card-top"><span class="swap-name">${c.teacher}</span><span class="swap-badge">${c.day} ${c.per}교시</span></div><div class="swap-detail"><b>${c.day} ${c.per}교시 ${c.subj}</b>(${c.room}실)과 교체 · <span style="color:#86868b">${c.dept}</span></div></div>`;
    });
  }
  
  openSheet('🗓️ 다른 주 수업과 교체', body);
}

      h+=`<div class="dp-cell${DP===k?' active':''}" onclick="setDP('${k}')">선택</div>`;

  const counts={};
  DEPTS.forEach(d=>{if(d==="전체")counts[d]=free.length;else counts[d]=free.filter(t=>t.d===d).length});
  h+='<div class="dept-row">';
  DEPTS.forEach(d=>{if(d==="전체"||counts[d]){h+=`<button class="dept-chip${DEPT_FILTER===d?' active':''}" onclick="setDeptFilter('${d}')">${d}<span class="cnt">${counts[d]}</span></button>`}});
  h+='</div>';
  const ff=filterByDept(free);
  if(ff.length===0)h+='<div class="empty-state">해당 교과 공강 교사 없음</div>';
  else{h+='<div class="chip-list">';ff.forEach(t=>{h+=`<span class="chip green-chip">${t.n}<span class="dept-tag">${t.d}</span></span>`});h+='</div>'}
  h+='</div>';
  
  h+=`<div class="card"><div class="result-head"><div class="card-title" style="margin:0;color:#c62828">🔴 수업중</div><span class="badge red">${busy.length}</span></div>`;
  if(busy.length>0){
    h+='<div style="max-height:300px;overflow-y:auto">';
    busy.forEach(b=>{h+=`<div class="impact-row"><div><span class="impact-name">${b.name}</span><span class="impact-dept">${b.dept}</span><div class="impact-details">${b.subj} · ${b.room}교실</div></div></div>`});

  h+='</div>';

// Render a class schedule with overrides applied
function renderClassScheduleWithOverrides(cls, weekStart){
  let h='';
  const classData = ALL_CLASSES[cls] || {};
  // Show "이동" placeholder for classes where student movable slots are known (only 2-10 currently)
  const showMovable = cls === "2-10";
  
  // For each slot, check if there's an override affecting the teacher of that slot
  // Also check if this class's homeroom room has any incoming override
  let changedCount = 0;
  const cellData = {};
  
  DAYS.forEach(d=>{PERIODS.forEach(p=>{
    const slot = d+p;
    const base = classData[slot];
    
    if(!base){
      // Empty slot - but might be a movable class period (for 2-10: 월2,월4,화2,수4,목5,금2,금4,금7)
      // For other classes: check if this slot is being used for any class by room lookup
      cellData[slot] = {type:"empty", base:null};
      return;
    }
    
    // Check overrides:
    // 1. Teacher is the "original" in a sub (대강) - their class is being taken by substitute
    // 2. Teacher1 or teacher2 in swap affecting this slot
    const records = Object.values(RECORDS[weekStart] || {});
    let override = null;
    for(const rec of records){
      if(rec.type === "sub" && rec.teacher === base.t && rec.day === d && rec.period === parseInt(p)){
        override = {type:"sub", by:rec.substitute, subj:rec.subj};
        break;
      }
      if(rec.type === "swap"){
        // The class at this slot belongs to teacher1 (week1/day1/period1)
        if(rec.teacher1 === base.t && rec.week1 === weekStart && rec.day1 === d && rec.period1 === parseInt(p)){
          override = {type:"swap-out", to:`${rec.week2} ${rec.day2}${rec.period2}`, subj:base.s};
          break;
        }
        // Or teacher2 at week2/day2/period2
        if(rec.teacher2 === base.t && rec.week2 === weekStart && rec.day2 === d && rec.period2 === parseInt(p)){
          override = {type:"swap-out", to:`${rec.week1} ${rec.day1}${rec.period1}`, subj:base.s};
          break;
        }
        // Incoming: teacher1's class came to week2/day2/period2 slot; but that slot belongs to teacher2's class in a different class
        // This is the "교체해서 다른 선생님이 맡는 상황" - affects the teacher's schedule, but not this class's room (since room stays)
        // For now, don't mark it
      }
    }
    
    if(override) changedCount++;
    cellData[slot] = {type:"class", base, override};
  })});
  
  h+='<div class="card" style="margin-top:10px">';
  h+='<div class="help-text">';
  h+='🟠 주황 테두리: 교체/대강 발생한 수업';
  if(changedCount>0)h+=` · <b>변경 ${changedCount}건</b>`;
  h+='</div>';
  
  h+='<div class="tt-wrap"><table class="tt"><thead><tr><th>⏰</th>';
  DAYS.forEach(d=>{h+=`<th>${d}</th>`});
  h+='</tr></thead><tbody>';
  PERIODS.forEach(pr=>{
    h+=`<tr><td style="background:#f5f5f7;color:#86868b;font-weight:700;font-size:10px">${pr}</td>`;
    DAYS.forEach(d=>{
      const slot=d+pr;
      const data=cellData[slot];
      if(!data || data.type==="empty"){
        // For 2-10, show 이동 for known movable slots
        const movableSlots=["월2","월4","화2","수4","목5","금2","금4","금7"];
        if(showMovable && movableSlots.includes(slot)){
          h+='<td style="background:#fff3e0;color:#bf360c"><div class="sn" style="font-size:9px">🚶 이동</div></td>';
        } else {
          h+='<td class="empty"><span style="color:#d1d1d6;font-size:9px">·</span></td>';
        }
        return;
      }
      const base=data.base;
      const override=data.override;
      const bg=gc(base.s);
      let style=`background:${bg}`;
      if(override) style += ';box-shadow:inset 0 0 0 2.5px #e65100';
      if(CURRENT_USER && CURRENT_USER.teacherName && base.t === CURRENT_USER.teacherName) style += ';outline:2px solid #1a237e;outline-offset:-2px';
      
      h+=`<td style="${style}">`;
      if(override){
        h+='<div style="position:relative">';
        if(override.type==="sub"){
          h+='<span style="position:absolute;top:-1px;right:0;font-size:9px">🆘</span>';
          h+=`<div class="sn" style="color:#e65100;font-weight:700;text-decoration:line-through;opacity:.7">${base.s}</div>`;
          h+=`<div class="rm" style="color:#e65100;font-weight:700">→${override.by}</div>`;
        }else if(override.type==="swap-out"){
          h+='<span style="position:absolute;top:-1px;right:0;font-size:9px">📤</span>';
          h+=`<div class="sn" style="color:#e65100;font-weight:700;text-decoration:line-through;opacity:.7">${base.s}</div>`;
          h+=`<div class="rm" style="color:#bf360c;font-size:7px">교체→</div>`;
        }
        h+='</div>';
      }else{
        h+=`<div class="sn">${base.s}</div><div class="rm">${base.t}</div>`;
      }
      h+='</td>';
    });
    h+='</tr>';
  });
  h+='</tbody></table></div>';
  h+='</div>';
  
  return h;
}

// ========== TAB: 교실 현황 ==========
function renderRoomTab(){
  let h='<div class="card"><div class="help-text">💡 교실을 선택하면 <b>주간 사용 현황</b> 확인</div>';

  const sorted=[...rooms].sort((a,b)=>{const na=parseInt(a),nb=parseInt(b);if(!isNaN(na)&&!isNaN(nb))return na-nb;return a.localeCompare(b)});
  h+='<div class="pill-wrap" style="max-height:180px;overflow-y:auto">';

  const usage={};
  T.forEach(t=>{Object.entries(t.s).forEach(([slot,v])=>{if(v&&v!=="X"){const p=v.split("|");if(p[1]===ROOM){if(!usage[slot])usage[slot]=[];usage[slot].push({teacher:t.n,subj:p[0].split(" ")[0],full:p[0]})}}})});
  let used=0,free=0;
  DAYS.forEach(d=>{PERIODS.forEach(p=>{if(usage[d+p])used++;else free++})});
  h+=`<div class="selected-banner"><div class="subj">🏫 ${ROOM}호</div><div class="meta">사용 ${used}교시 · 비어있음 ${free}교시</div></div>`;
  h+='<div class="card"><div class="card-title">📅 주간 현황</div>';
  h+='<div class="tt-wrap"><table class="tt"><thead><tr><th>⏰</th>';DAYS.forEach(d=>{h+=`<th>${d}</th>`});h+='</tr></thead><tbody>';
  PERIODS.forEach(pr=>{
    h+=`<tr><td style="background:#f5f5f7;color:#86868b">${pr}</td>`;
    DAYS.forEach(d=>{
      const k=d+pr;const u=usage[k];
      if(!u)h+=`<td style="background:#e8f5e9"><span style="color:#2e7d32;font-size:9px;font-weight:600">비어있음</span></td>`;
      else{const f=u[0];h+=`<td style="background:${gc(f.subj)}"><div class="sn">${f.full}</div><div class="rm">${f.teacher}</div>${u.length>1?`<div style="font-size:7px;color:#c62828">+${u.length-1}명</div>`:""}</td>`}
    });
    h+='</tr>';
  });
  h+='</tbody></table></div></div>';
  return h;
}

function calcStats(t){
  let own=0,duty=0;const daily={"월":0,"화":0,"수":0,"목":0,"금":0};let maxC=0;
  DAYS.forEach(d=>{let dc=0;PERIODS.forEach(p=>{const k=d+p;const v=t.s[k];if(!v||v==="X"){if(dc>maxC)maxC=dc;dc=0;return}const s=v.split("|")[0].split(" ")[0];if(s.includes("공강")||s.includes("진로"))duty++;else{own++;daily[d]++}dc++});if(dc>maxC)maxC=dc});
  return{own,duty,total:t.h,free:35-own-duty,daily,maxC};
}

function renderEventTab(){
  let h='<div class="card">';
  h+='<div class="help-text">💡 시험·행사로 빠지는 시간 선택 → <b>교사별 시수 손실</b> 자동 계산</div>';
